/* ============================ HELPERS ============================ */
function rgba(hex,a){ var n=parseInt(hex.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
function seed(i,s){ var x=Math.sin((i+1)*(s+1)*12.9898)*43758.5453; return x-Math.floor(x); }
function genSeries(end,delta,n,s){
  var start=end-delta, a=[];
  for(var i=0;i<n;i++){ var t=i/(n-1); var v=start+(end-start)*t;
    if(i>0&&i<n-1) v+=(seed(i,s)-0.5)*Math.max(5,Math.abs(delta));
    a.push(Math.max(3,Math.min(100,Math.round(v)))); }
  a[n-1]=Math.max(3,Math.min(100,end)); return a;
}
function sparkSvg(vals,color,h,fillId){
  var n=vals.length, mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals), rng=(mx-mn)||1, w=100;
  function X(i){ return (i/(n-1))*w; } function Y(v){ return h-((v-mn)/rng)*(h-3)-1.5; }
  var ln=''; vals.forEach(function(v,i){ ln+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' '; });
  var ar=ln+'L'+w+' '+h+' L0 '+h+' Z';
  return '<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="display:block">'
    +'<defs><linearGradient id="'+fillId+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+color+'" stop-opacity="0.22"/><stop offset="1" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'
    +'<path d="'+ar+'" fill="url(#'+fillId+')"/>'
    +'<path d="'+ln+'" fill="none" stroke="'+color+'" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>'
    +'<circle cx="'+X(n-1)+'" cy="'+Y(vals[n-1])+'" r="2.2" fill="'+color+'"/></svg>';
}

/* ============================ MODEL ============================ */
function eventScore(e){ var cred=cellVal(e.source,e.sourceSector); return e.sev*cred*e.corr*e.vel*e.stg*e.dec; }
function allEvents(){
  var out=[]; Object.keys(entities).forEach(function(k){
    entities[k].events.forEach(function(e){ var c=Object.assign({},e); c._owner=k; c._ent=entities[k]; out.push(c); });
  }); return out;
}
function findEvent(id){
  var keys=Object.keys(entities);
  for(var i=0;i<keys.length;i++){ var e=entities[keys[i]].events.find(function(x){return x.id===id;}); if(e) return {ev:e,owner:keys[i]}; }
  return null;
}
function compositeHealth(sc){
  var opp=sc.momentum*indices.momentum.weight+sc.catalyst*indices.catalyst.weight+sc.sentiment*indices.sentiment.weight;
  var risk=sc.controversy*indices.controversy.weight+sc.risk*indices.risk.weight+sc.esg*indices.esg.weight;
  var oppW=indices.momentum.weight+indices.catalyst.weight+indices.sentiment.weight;
  var riskW=indices.controversy.weight+indices.risk.weight+indices.esg.weight;
  var oppN=opp/oppW, riskN=risk/riskW;
  var health=Math.round(50+(oppN-riskN)*0.72);
  return {health:Math.max(0,Math.min(100,health)),oppN:Math.round(oppN),riskN:Math.round(riskN)};
}
function healthMeta(h){
  if(h>=65) return {c:C.opp,bg:C.oppBg,border:'#BCD6C4',label:'Healthy'};
  if(h>=50) return {c:C.gate,bg:C.gateBg,border:'#E4C98A',label:'Watch'};
  return {c:C.risk,bg:C.riskBg,border:'#E4B3A6',label:'Stressed'};
}
function credLabelColor(c){ return (c==='High'||c==='Verified')?C.opp:(c==='Medium'?C.gate:C.mute); }
function totalQuarantined(){
  return allEvents().filter(function(e){
    return e.quarantined && !(state.review[e.id]==='confirmed'||state.review[e.id]==='overridden') && !state.promoted[e.id];
  }).length;
}

/* ------------ TRUST TOLLGATE ------------ */

        +'<span style="font:600 8.5px \'Hanken Grotesk\';letter-spacing:.06em;text-transform:uppercase;opacity:.85;margin-top:1px">'+m.tier.split(' ')[0]+'</span></div></td>';
    }).join('');
    return '<tr><th style="text-align:left;font:600 12.5px \'Hanken Grotesk\';color:#16140F;white-space:nowrap;padding-right:12px">'+src+'</th>'+cells+'</tr>';
  }).join('');

  var legend=[{c:C.opp,l:'High · trusted (≥0.80)'},{c:C.gate,l:'Medium (0.50–0.79)'},{c:C.risk,l:'Low · quarantine (<0.50)'}].map(function(lg){
    return '<span style="display:inline-flex;align-items:center;gap:7px;font:500 12px \'Hanken Grotesk\';color:#4A463C"><span style="width:15px;height:15px;border-radius:4px;background:'+lg.c+'"></span>'+lg.l+'</span>';
  }).join('');

  var logic=promoLogic.map(function(p){
    return '<div style="padding:12px 16px;border-bottom:1px solid #EDE7D9">'
      +'<div style="font:600 13px \'Hanken Grotesk\';color:#16140F">'+p.t+'</div>'
      +'<div style="font:400 12.5px/1.5 \'Hanken Grotesk\';color:#4A463C;margin-top:2px">'+p.d+'</div></div>';

  var qEvents=allEvents().filter(function(e){ return e.quarantined; });
  var queue=qEvents.map(function(e){
    var ix=indices[e.index], cred=cellVal(e.source,e.sourceSector);
    var promoted=state.promoted[e.id], confirmations=e.corroboration.length;

    return '<div style="background:#FBF8F1;border:1px solid #E9E3D5;border-radius:12px;padding:14px 17px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">'
      +'<div style="flex:1;min-width:180px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span style="font:700 10px \'Hanken Grotesk\';letter-spacing:.03em;text-transform:uppercase;color:'+ix.color+'">'+ix.name+'</span><span style="font:500 11px \'Hanken Grotesk\';color:#A79F8C">· '+e._ent.name+'</span></div>'
      +'<button data-act="drawer" data-id="'+e.id+'" class="q-title" style="text-align:left;background:none;border:none;padding:0;cursor:pointer;font:600 14.5px \'Hanken Grotesk\';color:#16140F">'+e.title+'</button></div>'
      +'<div style="text-align:center"><div style="font:500 10px \'Hanken Grotesk\';color:#A79F8C;text-transform:uppercase;letter-spacing:.05em">Trust cell</div><div style="font:700 14px \'IBM Plex Mono\';color:#A8331F;margin-top:2px">'+cred.toFixed(2)+'</div></div>'
      +'<div style="text-align:center"><div style="font:500 10px \'Hanken Grotesk\';color:#A79F8C;text-transform:uppercase;letter-spacing:.05em">Corrob.</div><div style="font:700 14px \'IBM Plex Mono\';color:#4A463C;margin-top:2px">'+confirmations+'/2</div></div>'
      +'<span style="font:600 11px \'Hanken Grotesk\';color:'+(promoted?C.opp:C.gate)+';background:'+(promoted?C.oppBg:C.gateBg)+';padding:5px 11px;border-radius:7px">'+(promoted?'Promoted':'Watch')+'</span>'
      +(canPromote?'<button data-act="promote" data-id="'+e.id+'" class="promote-btn" style="font:600 12px \'Hanken Grotesk\';color:#2F6B4F;background:#E2EFE6;border:1px solid #BCD6C4;border-radius:8px;padding:7px 13px;cursor:pointer">Promote →</button>':'')
      +'</div>';
  }).join('');

  return '<div style="padding:24px 30px 44px 30px;max-width:1180px;margin:0 auto">'
    +'<div style="display:flex;align-items:flex-start;gap:15px;margin-bottom:8px">'
    +'<div style="width:48px;height:48px;border-radius:12px;background:#F6EBD6;display:flex;align-items:center;justify-content:center;flex:0 0 auto">'+icon('shield-check',24,1.7,C.gate)+'</div>'
    +'<div><h2 style="font:600 24px/1.05 \'Newsreader\',serif;color:#16140F;margin:0">Source × sector trust matrix</h2>'
    +'<p style="font:400 14px/1.5 \'Hanken Grotesk\';color:#4A463C;margin:7px 0 0 0;max-width:76ch">No single global trust score per source. Each source carries a distinct weight per sector — the same outlet can be a strong signal in one sector and quarantined in another. These weights become the credibility factor in every event score.</p></div></div>'
    +'<div style="display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:26px;align-items:start;margin-top:20px">'
    +'<div><div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:18px 20px;overflow-x:auto">'
    +'<table style="border-collapse:separate;border-spacing:5px;width:100%"><thead><tr>'
    +'<th style="text-align:left;font:700 9.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:#8A8474;padding-right:12px;vertical-align:bottom">Source ↓ / Sector →</th>'+headRow+'</tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>'
    +'<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px">'+legend+'</div></div>'
    +'<div><h4 style="font:700 12px \'Hanken Grotesk\';letter-spacing:.11em;text-transform:uppercase;color:#8A8474;margin:0 0 12px 0">Quarantine &amp; promotion logic</h4>'
    +'<div style="background:#FBF8F1;border:1px solid #E9E3D5;border-left:3px solid #B5791A;border-radius:11px;overflow:hidden">'+logic+'</div></div></div>'
    +'<div style="display:flex;align-items:center;gap:9px;margin:28px 0 13px 0">'
    +'<span style="color:#B5791A;display:flex">'+icon('inbox',15,2,C.gate)+'</span>'
    +'<h3 style="font:600 17px \'Newsreader\',serif;color:#16140F;margin:0">Quarantine queue</h3>'
    +'<span style="font:500 11px \'Hanken Grotesk\';color:#8A8474">held in watch state · never discarded</span></div>'
    +(qEvents.length?'<div style="display:flex;flex-direction:column;gap:11px">'+queue+'</div>':'')
    +'</div>';
}

/* ------------ SCORING MODEL ------------ */
var scoringOther=[{n:'Viral labor backlash',m:'PR · allegation',v:0.53},{n:'Environmental fine',m:'settled · 5mo old',v:0.06}];
function calcScores(){
  var c=state.calc;
  var ev1=c.sev*c.cred*c.corr*c.vel*c.stg*c.dec;
  var raw=ev1+scoringOther[0].v+scoringOther[1].v;
  return {ev1:ev1, entityScore:Math.round(100*raw/(raw+c.k))};
}
function renderScoring(){
  var c=state.calc, r=calcScores();
  var sliders=[
    {k:'sev',label:'Severity',min:0.1,max:1,step:0.05,val:c.sev,disp:c.sev.toFixed(2)},
    {k:'cred',label:'Credibility',min:0.1,max:1,step:0.05,val:c.cred,disp:c.cred.toFixed(2)},
    {k:'corr',label:'Corroboration',min:1,max:1.5,step:0.05,val:c.corr,disp:c.corr.toFixed(2)},
    {k:'vel',label:'Velocity',min:0.8,max:1.5,step:0.05,val:c.vel,disp:c.vel.toFixed(2)},
    {k:'stg',label:'Stage modifier',min:0.3,max:1.4,step:0.1,val:c.stg,disp:c.stg.toFixed(2)},
    {k:'dec',label:'Decay',min:0.1,max:1,step:0.05,val:c.dec,disp:c.dec.toFixed(2)},
    {k:'k',label:'Sector k',min:1,max:6,step:0.5,val:c.k,disp:c.k.toFixed(1)}
  ];
  var rows=sliders.map(function(s){
    return '<label style="font:500 13px \'Hanken Grotesk\';color:#4A463C">'+s.label+'</label>'
      +'<input type="range" data-k="'+s.k+'" min="'+s.min+'" max="'+s.max+'" step="'+s.step+'" value="'+s.val+'" />'
      +'<output id="disp-'+s.k+'" style="text-align:right;font:600 13px \'IBM Plex Mono\';color:#16140F">'+s.disp+'</output>';
  }).join('');
  var others=scoringOther.map(function(o){
    return '<div style="display:flex;justify-content:space-between;padding:4px 0;font:500 13px \'Hanken Grotesk\';color:#4A463C"><span>'+o.n+' <span style="color:#A79F8C">· '+o.m+'</span></span><span style="font:600 13px \'IBM Plex Mono\'">'+o.v+'</span></div>';
  }).join('');

  return '<div style="padding:24px 30px 44px 30px;max-width:940px;margin:0 auto">'
    +'<div style="display:flex;align-items:flex-start;gap:15px;margin-bottom:20px">'
    +'<div style="width:48px;height:48px;border-radius:12px;background:#E9E5F3;display:flex;align-items:center;justify-content:center;flex:0 0 auto">'+icon('gauge',24,1.7,C.comp)+'</div>'
    +'<div><h2 style="font:600 24px/1.05 \'Newsreader\',serif;color:#16140F;margin:0">The event engine</h2>'
    +'<p style="font:400 14px/1.5 \'Hanken Grotesk\';color:#4A463C;margin:7px 0 0 0;max-width:74ch">One six-factor score per event, aggregated into an entity 0–100 through a saturating curve. Pull the sliders to see how a single event moves an entity score.</p></div></div>'
    +'<div style="background:#16140F;border-radius:14px;padding:24px 26px;margin-bottom:20px">'
    +'<div style="font:600 10.5px \'IBM Plex Mono\';color:#9DB9C9;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Per-event score</div>'
    +'<div style="font:500 15px/1.7 \'IBM Plex Mono\';color:#E8E2D4">EventScore = <span style="color:#E8A87C">Severity</span> × <span style="color:#E8A87C">Credibility</span> × <span style="color:#E8A87C">Corroboration</span> × <span style="color:#E8A87C">Velocity</span> × <span style="color:#E8A87C">Stage</span> × <span style="color:#E8A87C">Decay</span></div>'
    +'<div style="font:600 10.5px \'IBM Plex Mono\';color:#9DB9C9;letter-spacing:.1em;text-transform:uppercase;margin:20px 0 12px 0">Aggregation to entity 0–100</div>'
    +'<div style="font:500 14.5px/1.7 \'IBM Plex Mono\';color:#E8E2D4">Raw = Σ EventScores <span style="color:#9DB9C9">(decay-weighted, capped)</span><br>EntityScore = 100 × Raw / (Raw + <span style="color:#E8A87C">k</span>) <span style="color:#9DB9C9">// sector-calibrated k</span></div></div>'
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:14px;padding:22px 24px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:18px"><span style="color:#5A4A8C;display:flex">'+icon('gauge',16,2)+'</span><span style="font:700 13px \'Hanken Grotesk\';color:#16140F">Live calculator — Event 1</span></div>'
    +'<div style="display:grid;grid-template-columns:150px 1fr 54px;gap:13px 16px;align-items:center">'+rows+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px">'
    +'<div style="background:#fff;border:1px solid #E9E3D5;border-radius:10px;padding:15px 17px">'
    +'<div style="font:500 12px \'Hanken Grotesk\';color:#8A8474">Event 1 score</div>'
    +'<div id="calc-ev1" style="font:700 27px \'IBM Plex Mono\';color:#16140F;margin-top:3px">'+r.ev1.toFixed(2)+'</div></div>'
    +'<div style="background:#F6E5DF;border-radius:10px;padding:15px 17px">'
    +'<div style="font:500 12px \'Hanken Grotesk\';color:#A8331F">Entity controversy score</div>'
    +'<div id="calc-entity" style="font:700 27px \'IBM Plex Mono\';color:#A8331F;margin-top:3px">'+r.entityScore+'</div></div></div>'
    +'<div style="margin-top:16px;border-top:1px solid #E9E3D5;padding-top:14px">'+others+'</div>'
    +'<p style="font:400 12px/1.6 \'Hanken Grotesk\';color:#8A8474;margin:14px 0 0 0">Pull <b style="font-weight:600">Stage modifier</b> to 0.3 (settlement) and watch Event 1 collapse — the saturating roll-up keeps any single event from running the score to 100.</p>'
    +'</div></div>';
}

    +'<div style="display:flex;flex-direction:column;gap:0">'+stages+'</div></div>';

/* ------------ SOURCE MONITOR ------------ */
function renderSources(){
  var statusMeta={ 'LIVE':{c:C.opp,bg:C.oppBg,pulse:true}, 'QUOTA-MANAGED':{c:C.gate,bg:C.gateBg,pulse:false}, 'PLANNED':{c:C.mute,bg:'#EFEADD',pulse:false} };
  var feeds=(FI&&FI.feeds)||[
    {name:'Google News RSS · India edition',detail:'Entity channels · month-sliced queries',status:'LIVE'},
    {name:'GDELT DOC 2.0 API',detail:'Global news firehose · quota-managed backfill',status:'QUOTA-MANAGED'},
    {name:'GDELT Events (CAMEO)',detail:'Structured event codes · cross-validation',status:'PLANNED'}
  ];
  var srcRows=(FI&&FI.sources)||[];
  var totalRecords=srcRows.reduce(function(a,s){return a+s.records;},0);

  var feedCards=feeds.map(function(f){

      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">'
      +'<span style="display:inline-flex;align-items:center;gap:7px;font:600 11px \'Hanken Grotesk\';color:'+m.c+';background:'+m.bg+';padding:4px 10px;border-radius:7px">'
      +'<span style="width:7px;height:7px;border-radius:50%;background:'+m.c+(m.pulse?';animation:fiPulse 2.2s infinite':'')+'"></span>'+f.status+'</span>'
      +'<span style="color:'+C.signal+';display:flex">'+icon('plug',15,2,C.signal)+'</span></div>'
      +'<div style="font:600 15px \'Hanken Grotesk\';color:#16140F">'+f.name+'</div>'
      +'<div style="font:400 12px/1.5 \'Hanken Grotesk\';color:#8A8474;margin-top:4px">'+f.detail+'</div></div>';
  }).join('');

  function stat(label,val,color){
    return '<div style="flex:1;min-width:150px;background:#FBF8F1;border:1px solid #DED7C5;border-radius:11px;padding:14px 16px">'
      +'<div style="font:500 10px \'Hanken Grotesk\';color:#8A8474;text-transform:uppercase;letter-spacing:.07em">'+label+'</div>'
      +'<div style="font:700 22px \'IBM Plex Mono\';color:'+(color||'#16140F')+';margin-top:5px">'+val+'</div></div>';
  }
  var stats=stat('Feeds monitored',feeds.length)+stat('Raw articles processed',rawTotal.toLocaleString())
    +stat('Relevant events extracted',totalRecords.toLocaleString(),C.comp)+stat('Coverage window',(FI&&FI.window)||'Live','#16140F');

  var classCards=srcRows.map(function(s){
    var chips=s.topDomains.map(function(t){
      return '<span style="font:500 11px \'IBM Plex Mono\';background:#F0EBDE;color:#4A463C;padding:3px 8px;border-radius:6px">'+t.d+' <span style="color:#A79F8C">'+t.n+'</span></span>';
    }).join(' ');
    var mid=(s.trustMin+s.trustMax)/2;
    var mcol=mid>=0.8?C.opp:mid>=0.5?C.gate:C.risk;
    return '<div style="background:#FBF8F1;border:1px solid #E9E3D5;border-left:3px solid '+mcol+';border-radius:11px;padding:15px 18px">'
      +'<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px">'
      +'<span style="font:600 15px \'Hanken Grotesk\';color:#16140F">'+s.name+'</span>'
      +'<span style="font:600 11px \'IBM Plex Mono\';color:'+mcol+'">trust '+s.trustMin.toFixed(2)+'–'+s.trustMax.toFixed(2)+'</span>'
      +'<span style="margin-left:auto;font:500 12px \'Hanken Grotesk\';color:#8A8474">'+s.outlets+' outlets · '+s.records+' events</span></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'+(chips||'<span style="font:500 12px \'Hanken Grotesk\';color:#A79F8C">no records this window</span>')+'</div></div>';
  }).join('');

  var covRows=Object.keys(entities).map(function(id){
    var e=entities[id];
    return '<tr>'
      +'<td style="padding:9px 12px;font:600 12.5px \'Hanken Grotesk\';color:#16140F;white-space:nowrap">'+e.name+'</td>'

      +'<td style="padding:9px 12px;font:600 12px \'IBM Plex Mono\';color:'+C.comp+';text-align:right">'+(e.articleCount||0)+'</td>'
      +'<td style="padding:9px 12px;font:600 12px \'IBM Plex Mono\';color:'+C.gate+';text-align:right">'+(e.quarantined||0)+'</td>'
      +'<td style="padding:9px 12px;text-align:right"><span style="display:inline-flex;align-items:center;gap:6px;font:600 10.5px \'IBM Plex Mono\';color:'+C.opp+'"><span style="width:7px;height:7px;border-radius:50%;background:'+C.opp+';animation:fiPulse 2.2s infinite"></span>WATCHING</span></td></tr>';
  }).join('');

  return '<div style="padding:24px 30px 44px 30px;max-width:1120px;margin:0 auto">'

    +'<div><h2 style="font:600 24px/1.05 \'Newsreader\',serif;color:#16140F;margin:0">What the platform is watching</h2>'
    +'<p style="font:400 14px/1.5 \'Hanken Grotesk\';color:#4A463C;margin:7px 0 0 0;max-width:74ch">Continuous multi-feed ingestion across the coverage universe. Every article is entity-resolved, trust-weighted through the tollgate, and either scored or quarantined — nothing is silently dropped.</p></div></div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px">'+stats+'</div>'
    +'<h4 style="font:700 12px \'Hanken Grotesk\';letter-spacing:.11em;text-transform:uppercase;color:#8A8474;margin:0 0 12px 0">Ingestion feeds</h4>'

    +'<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:26px">'+classCards+'</div>':'')
    +'<h4 style="font:700 12px \'Hanken Grotesk\';letter-spacing:.11em;text-transform:uppercase;color:#8A8474;margin:0 0 12px 0">Entity coverage</h4>'
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:8px 10px;overflow-x:auto">'
    +'<table style="border-collapse:collapse;width:100%"><thead><tr>'
    +'<th style="padding:9px 12px;text-align:left;font:700 9.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:#8A8474">Entity</th>'
    +'<th style="padding:9px 12px;text-align:right;font:700 9.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:#8A8474">Raw articles</th>'
    +'<th style="padding:9px 12px;text-align:right;font:700 9.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:#8A8474">Relevant</th>'
    +'<th style="padding:9px 12px;text-align:right;font:700 9.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:#8A8474">Quarantined</th>'
    +'<th style="padding:9px 12px;text-align:right;font:700 9.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:#8A8474">Status</th>'
    +'</tr></thead><tbody>'+covRows+'</tbody></table></div>'
    +'</div>';
}

/* ------------ DISTRIBUTION ------------ */
function renderDistribution(){
  var cards=indexOrder.map(function(k){
    var ix=indices[k];
    var buyer=ix.side==='Risk'?(k==='esg'?'Mandate & compliance desks':'Risk & credit books'):(k==='sentiment'?'Systematic & quant':'Event-driven & long-only');
    return '<div style="background:#FBF8F1;border:1px solid #E9E3D5;border-top:3px solid '+ix.color+';border-radius:11px;padding:15px 17px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">'
      +'<div style="width:34px;height:34px;border-radius:9px;background:'+rgba(ix.color,0.12)+';display:flex;align-items:center;justify-content:center">'+icon(ix.icon,18,2,ix.color)+'</div>'
      +'<span style="color:#B5791A;display:flex">'+icon('lock',13,2,C.gate)+'</span></div>'
      +'<div style="font:600 15px \'Hanken Grotesk\';color:#16140F">'+ix.name+' index</div>'
      +'<div style="font:500 11px \'Hanken Grotesk\';color:'+ix.color+';margin-top:2px">'+(ix.side==='Risk'?'Risk-side':'Opportunity-side')+'</div>'
      +'<div style="font:400 12px/1.45 \'Hanken Grotesk\';color:#8A8474;margin-top:9px;padding-top:9px;border-top:1px solid #EDE7D9">Primary buyer · '+buyer+'</div></div>';
  }).join('');

  var api=apiEndpoints.map(function(e){
    return '<div style="display:flex;align-items:center;gap:12px;padding:13px 17px;border-bottom:1px solid rgba(245,241,232,.08)">'
      +'<span style="font:700 10px \'IBM Plex Mono\';color:#7FB49B;background:rgba(47,107,79,.25);padding:3px 7px;border-radius:5px;flex:0 0 auto">'+e.m+'</span>'
      +'<div style="flex:1;min-width:0"><div style="font:500 12.5px \'IBM Plex Mono\';color:#E8E2D4">'+e.path+'</div>'
      +'<div style="font:400 11.5px \'Hanken Grotesk\';color:#9B9481;margin-top:2px">'+e.d+'</div></div></div>';
  }).join('');

  return '<div style="padding:24px 30px 44px 30px;max-width:1120px;margin:0 auto">'
    +'<div style="display:flex;align-items:flex-start;gap:15px;margin-bottom:22px">'
    +'<div style="width:48px;height:48px;border-radius:12px;background:#E2EFE6;display:flex;align-items:center;justify-content:center;flex:0 0 auto">'+icon('share',24,1.7,C.opp)+'</div>'
    +'<div><h2 style="font:600 24px/1.05 \'Newsreader\',serif;color:#16140F;margin:0">Insight layer &amp; distribution</h2>'
    +'<p style="font:400 14px/1.5 \'Hanken Grotesk\';color:#4A463C;margin:7px 0 0 0;max-width:72ch">Scores, alerts, and narratives delivered to machines and analysts. Each index can be licensed independently by a different buyer.</p></div></div>'
    +'<h4 style="font:700 12px \'Hanken Grotesk\';letter-spacing:.11em;text-transform:uppercase;color:#8A8474;margin:0 0 12px 0">Per-index licensing</h4>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px">'+cards+'</div>'
    +'<div style="display:grid;grid-template-columns:minmax(0,1.3fr) minmax(0,1fr);gap:20px;margin-top:24px;align-items:start">'
    +'<div><h4 style="font:700 12px \'Hanken Grotesk\';letter-spacing:.11em;text-transform:uppercase;color:#8A8474;margin:0 0 12px 0">API feeds</h4>'
    +'<div style="background:#16140F;border-radius:12px;overflow:hidden">'+api+'</div></div>'
    +'<div><h4 style="font:700 12px \'Hanken Grotesk\';letter-spacing:.11em;text-transform:uppercase;color:#8A8474;margin:0 0 12px 0">Generated narratives</h4>'
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:12px;padding:17px 19px">'
    +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:10px"><span style="color:#5A4A8C;display:flex">'+icon('scroll-text',16,2)+'</span><span style="font:600 12px \'Hanken Grotesk\';color:#16140F">Analyst brief</span></div>'
    +'<p style="font:400 14px/1.65 \'Newsreader\',serif;color:#2A2820;margin:0">'+(FI?entities[state.entity].narrative:'Lumora Energy’s health fell 6 points this week as a corroborated FERC inquiry drove the controversy index to 71. The move is partly offset by a 20-year modernization contract lifting momentum. A deposit-outflow-style rumor remains quarantined pending confirmation.')+'</p>'
    +'<div style="font:500 10.5px \'IBM Plex Mono\';color:#A79F8C;margin-top:12px;padding-top:12px;border-top:1px solid #EDE7D9">Source-grounded · each claim cites corroborated events · delivered on material score change</div></div></div>'
    +'</div></div>';
}

/* ------------ EVIDENCE DRAWER ------------ */
function renderDrawer(){
  if(!state.drawer) return '';
  var f=findEvent(state.drawer); if(!f) return '';
  var e=f.ev, ix=indices[e.index], es=eventScore(e);
  var cred=cellVal(e.source,e.sourceSector), cm=cellMeta(cred);
  var dirPos=e.dir==='pos';

  function factorRow(label,val,max,note,color){
    var pct=Math.min(100,(val/max)*100);
    return '<div><div style="display:flex;justify-content:space-between;align-items:baseline;font:500 12px \'Hanken Grotesk\';color:#4A463C;margin-bottom:4px"><span>'+label+'</span><span style="font:600 11.5px \'IBM Plex Mono\';color:'+color+'">'+val.toFixed(2)+'×</span></div>'
      +'<div style="height:5px;border-radius:3px;background:#EFEADD;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:3px"></div></div>'
      +'<div style="font:400 10.5px \'Hanken Grotesk\';color:#A79F8C;margin-top:3px">'+note+'</div></div>';
  }
  var factors=[
    factorRow('Severity',e.sev,1,'Magnitude of the event',ix.color),
    factorRow('Credibility',cred,1,e.source+' in '+e.sourceSector+' (tollgate)',C.gate),
    factorRow('Corroboration',e.corr,1.5,e.corroboration.length+' independent source(s)',ix.color),
    factorRow('Velocity',e.vel,1.5,'Rate of development',ix.color),
    factorRow('Stage',e.stg,1.4,e.stage?('Currently: '+e.stage):'Not stage-gated',ix.color),
    factorRow('Decay',e.dec,1,'Freshness weighting',ix.color)
  ].join('');

  // stage timeline
  var stagesHtml='';
  if(e.stage){
    var defs=[['Allegation',0.6],['Probe',1.2],['Charge',1.4],['Resolution',0.3]];
    var cur=e.stage.toLowerCase();
    var curIdx=defs.findIndex(function(d){ return d[0].toLowerCase()===cur; });
    var chain=defs.map(function(d,i){
      var label=d[0], mult=d[1], active=label.toLowerCase()===cur, passed=curIdx>=i;
      var bg=active?C.gate:(passed?C.gateBg:'#fff');
      var fg=active?'#fff':(passed?'#8A5A0E':C.mute);
      var border=active?C.gate:'#E0D9C8';
      var labelColor=active?C.ink:C.mute;
      return '<div style="display:flex;align-items:center;flex:0 0 auto">'
        +'<div style="display:flex;flex-direction:column;align-items:center;gap:6px">'
        +'<span style="width:26px;height:26px;border-radius:50%;background:'+bg+';color:'+fg+';border:2px solid '+border+';display:flex;align-items:center;justify-content:center;font:700 10px \'IBM Plex Mono\'">'+mult.toFixed(1)+'</span>'
        +'<span style="font:600 10px \'Hanken Grotesk\';color:'+labelColor+';text-align:center;max-width:56px">'+label+'</span></div>'
        +(i<defs.length-1?'<span style="width:20px;height:2px;background:#E0D9C8;margin:0 2px 18px 2px"></span>':'')
        +'</div>';
    }).join('');
    stagesHtml='<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:15px"><span style="color:#B5791A;display:flex">'+icon('clock',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Stage modifier</span></div>'
      +'<div style="display:flex;align-items:center">'+chain+'</div>'
      +'<div style="font:400 11.5px/1.5 \'Hanken Grotesk\';color:#6E6858;margin-top:13px">Settlement releases the score — a resolved matter collapses toward 0.3×, making this a live gauge, not a permanent blocklist.</div></div>';
  }

  var status=state.review[state.drawer]||(e.quarantined?'quarantined':'pending');
  var stMeta={
    pending:{label:'Pending analyst review',c:C.gate,bg:C.gateBg,border:'#E4C98A',icon:'clock'},
    confirmed:{label:'Confirmed by you',c:C.opp,bg:C.oppBg,border:'#BCD6C4',icon:'check'},
    quarantined:{label:'Quarantined — awaiting corroboration',c:C.gate,bg:C.gateBg,border:'#E4C98A',icon:'lock'},
    overridden:{label:'Overridden by you',c:C.comp,bg:C.compBg,border:'#D2CBE6',icon:'user'}
  }[status];
  var showQuar=e.quarantined&&status!=='confirmed'&&status!=='overridden';

  var corrob=e.corroboration.map(function(c2){
    var col=credLabelColor(c2.cred);
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#fff;border:1px solid #E9E3D5;border-radius:9px">'
      +'<span style="font:500 12.5px \'Hanken Grotesk\';color:#2A2820">'+c2.name+'</span>'
      +'<span style="display:inline-flex;align-items:center;gap:6px;font:600 11px \'Hanken Grotesk\';color:'+col+'"><span style="width:7px;height:7px;border-radius:50%;background:'+col+'"></span>'+c2.cred+'</span></div>';
  }).join('');

  var prov=e.provenance.map(function(p,i){
    return '<div style="display:flex;gap:12px">'
      +'<div style="display:flex;flex-direction:column;align-items:center;flex:0 0 auto">'
      +'<span style="width:21px;height:21px;border-radius:50%;background:#E9E3D5;color:#4A463C;display:flex;align-items:center;justify-content:center;font:700 10px \'IBM Plex Mono\'">'+(i+1)+'</span>'
      +(i<e.provenance.length-1?'<span style="width:2px;flex:1;background:#E0D9C8;min-height:13px"></span>':'')
      +'</div><div style="padding-bottom:13px"><div style="font:500 12.5px/1.4 \'Hanken Grotesk\';color:#2A2820">'+p+'</div></div></div>';
  }).join('');

  var auditRows=e.audit.map(function(a){ return {time:a.time,actor:a.actor,action:a.action,id:a.id,dot:'#C9C2B2'}; })
    .concat(state.userAudit[state.drawer]||[]);
  var audit=auditRows.map(function(au){
    return '<div style="display:flex;gap:11px">'
      +'<span style="width:8px;height:8px;border-radius:50%;background:'+au.dot+';margin-top:5px;flex:0 0 auto"></span>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:8px"><span style="font:600 12.5px \'Hanken Grotesk\';color:#2A2820">'+au.action+'</span><span style="font:500 10px \'Hanken Grotesk\';color:#B0A891;white-space:nowrap">'+au.time+'</span></div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-top:2px"><span style="font:500 11px \'Hanken Grotesk\';color:#8A8474">'+au.actor+'</span><span style="font:500 10px \'IBM Plex Mono\';color:#B0A891;background:#F0EBDE;padding:1px 6px;border-radius:5px">'+au.id+'</span></div>'
      +'</div></div>';
  }).join('');

  var anim=(lastDrawer!==state.drawer);
  return '<div style="position:fixed;inset:0;z-index:40;display:flex;justify-content:flex-end">'
    +'<div data-act="close-drawer" class="'+(anim?'backdrop-anim':'')+'" style="position:absolute;inset:0;background:rgba(22,20,15,.44)"></div>'
    +'<div id="drawer-scroll" class="fi-scroll '+(anim?'drawer-anim':'')+'" style="position:relative;width:486px;max-width:93vw;height:100%;background:#F5F1E8;box-shadow:-22px 0 55px rgba(22,20,15,.25);overflow-y:auto">'
    // sticky header
    +'<div style="position:sticky;top:0;z-index:2;background:#FBF8F1;border-bottom:1px solid #DED7C5;padding:18px 22px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px">'
    +'<span style="display:inline-flex;align-items:center;gap:8px;font:700 10.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:'+ix.color+'">'+icon(ix.icon,14,2,ix.color)+ix.name.toUpperCase()+' · '+e.pillar+'</span>'
    +'<button data-act="close-drawer" class="icon-btn" style="width:31px;height:31px;border-radius:8px;border:1px solid #DED7C5;background:#F5F1E8;display:flex;align-items:center;justify-content:center;color:#4A463C;cursor:pointer">'+icon('x',16,2.2)+'</button></div>'
    +'<div style="font:600 18px/1.3 \'Newsreader\',serif;color:#16140F">'+e.title+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap">'
    +'<span style="display:inline-flex;align-items:center;gap:6px;font:600 12px \'IBM Plex Mono\';color:'+ix.color+';background:'+rgba(ix.color,0.1)+';padding:5px 11px;border-radius:8px">Event score '+es.toFixed(2)+'</span>'
    +'<span style="display:inline-flex;align-items:center;gap:6px;font:600 11px \'Hanken Grotesk\';color:'+(dirPos?C.opp:C.risk)+';background:'+(dirPos?C.oppBg:C.riskBg)+';padding:5px 10px;border-radius:8px">'+icon(dirPos?'arrow-up-right':'arrow-down-right',12,2.2,dirPos?C.opp:C.risk)+e.direction+'</span>'
    +(showQuar?'<span style="display:inline-flex;align-items:center;gap:5px;font:600 11px \'Hanken Grotesk\';color:#B5791A;background:#F6EBD6;border:1px solid #E4C98A;padding:5px 10px;border-radius:8px">'+icon('lock',11,2.2,C.gate)+'Quarantined</span>':'')
    +(e.url?'<a href="'+e.url+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font:600 11px \'Hanken Grotesk\';color:#2C5C73;background:#E0EBF0;padding:5px 10px;border-radius:8px;text-decoration:none">'+icon('arrow-up-right',12,2.2,C.signal)+'Source article</a>':'')
    +'</div></div>'
    // body
    +'<div style="padding:18px 22px 30px 22px;display:flex;flex-direction:column;gap:16px">'
    // factors
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="color:#5A4A8C;display:flex">'+icon('gauge',16,2)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Event-score factors</span></div>'
    +'<div style="display:flex;flex-direction:column;gap:11px">'+factors+'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:13px;border-top:1px solid #E9E3D5">'
    +'<span style="font:600 12px \'Hanken Grotesk\';color:#4A463C">Product = event score</span>'
    +'<span style="font:700 18px \'IBM Plex Mono\';color:'+ix.color+'">'+es.toFixed(2)+'</span></div></div>'
    +stagesHtml
    // trust cell
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:13px"><span style="color:#B5791A;display:flex">'+icon('shield',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Trust tollgate — source × sector</span></div>'
    +'<div style="display:flex;align-items:center;gap:13px">'
    +'<div style="flex:1;min-width:0"><div style="font:600 13px \'Hanken Grotesk\';color:#16140F">'+e.source+'</div>'
    +'<div style="font:500 11.5px \'Hanken Grotesk\';color:#8A8474;margin-top:2px">in '+e.sourceSector+'</div></div>'
    +'<div style="text-align:center;background:'+cm.bg+';border-radius:9px;padding:9px 15px">'
    +'<div style="font:700 20px/1 \'IBM Plex Mono\';color:'+cm.fg+'">'+cred.toFixed(2)+'</div>'
    +'<div style="font:600 9px \'Hanken Grotesk\';letter-spacing:.08em;text-transform:uppercase;color:'+cm.fg+';margin-top:3px">'+cm.tier+'</div></div></div>'
    +'<div style="font:400 11px/1.5 \'Hanken Grotesk\';color:#A79F8C;margin-top:11px">This source-sector weight is the credibility factor above. '+(cred<0.5?'Below the 0.5 threshold — event routed to quarantine until independently confirmed.':'At or above threshold — event flows straight to scoring.')+'</div></div>'
    // corroboration
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="color:#2C5C73;display:flex">'+icon('square-check',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Corroboration</span></div>'
    +'<span style="font:600 11px \'IBM Plex Mono\';color:#6E6858;background:#F0EBDE;padding:2px 8px;border-radius:6px">'+e.corroboration.length+' independent</span></div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'+corrob+'</div></div>'
    // provenance
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="color:#2F6B4F;display:flex">'+icon('git-branch',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Provenance chain</span></div>'
    +'<div style="display:flex;flex-direction:column">'+prov+'</div></div>'
    // audit
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="color:#4A463C;display:flex">'+icon('scroll-text',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Audit trail</span></div>'
    +'<div style="display:flex;flex-direction:column;gap:12px">'+audit+'</div></div>'
    // analyst review
    +'<div style="background:#EDE9F3;border:1px solid #D2CBE6;border-radius:13px;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:11px"><span style="color:#5A4A8C;display:flex">'+icon('user',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Analyst review</span></div>'
    +'<div style="display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;background:'+stMeta.bg+';border:1px solid '+stMeta.border+';margin-bottom:13px">'
    +'<span style="color:'+stMeta.c+';display:flex">'+icon(stMeta.icon,15,2.2,stMeta.c)+'</span>'
    +'<span style="font:600 12.5px \'Hanken Grotesk\';color:'+stMeta.c+'">'+stMeta.label+'</span></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'
    +'<button data-act="review" data-id="'+e.id+'" data-status="confirmed" data-label="Confirmed event" class="btn-confirm" style="display:flex;align-items:center;justify-content:center;gap:6px;height:37px;border-radius:9px;border:1px solid #BCD6C4;background:#E2EFE6;color:#2F6B4F;font:600 12px \'Hanken Grotesk\';cursor:pointer">'+icon('check',13,2.6,C.opp)+'Confirm</button>'
    +'<button data-act="review" data-id="'+e.id+'" data-status="quarantined" data-label="Sent to quarantine" class="btn-quar" style="display:flex;align-items:center;justify-content:center;gap:6px;height:37px;border-radius:9px;border:1px solid #E4C98A;background:#F6EBD6;color:#B5791A;font:600 12px \'Hanken Grotesk\';cursor:pointer">'+icon('lock',12,2.2,C.gate)+'Quarantine</button>'
    +'<button data-act="review" data-id="'+e.id+'" data-status="overridden" data-label="Overrode disposition" class="btn-over" style="display:flex;align-items:center;justify-content:center;gap:6px;height:37px;border-radius:9px;border:1px solid #D2CBE6;background:#E9E5F3;color:#5A4A8C;font:600 12px \'Hanken Grotesk\';cursor:pointer">'+icon('user',12,2,C.comp)+'Override</button>'
    +'</div></div>'
    +'</div></div></div>';
}

/* ============================ RENDER ============================ */
var viewRenderers={workbench:renderWorkbench,indices:renderIndices,tollgate:renderTollgate,scoring:renderScoring,pipeline:renderPipeline,sources:renderSources,distribution:renderDistribution};

function render(){
  var app=document.getElementById('app');
  var mainEl=document.getElementById('main');
  var mainScroll=mainEl?mainEl.scrollTop:0;
  var drawerEl=document.getElementById('drawer-scroll');
  var drawerScroll=(drawerEl&&lastDrawer===state.drawer)?drawerEl.scrollTop:0;

  app.innerHTML='<div style="display:flex;height:100vh;width:100%;overflow:hidden;background:#F5F1E8;font-family:\'Hanken Grotesk\',sans-serif">'
    +renderSidebar()
    +'<div style="flex:1;min-width:0;height:100%;display:flex;flex-direction:column">'
    +renderHeader()
    +'<main id="main" class="fi-scroll" style="flex:1;overflow-y:auto;background:#F5F1E8">'
    +viewRenderers[state.view]()
    +'</main></div>'
    +renderDrawer()
    +'</div>';

  var m=document.getElementById('main'); if(m) m.scrollTop=mainScroll;
  var d=document.getElementById('drawer-scroll'); if(d&&drawerScroll) d.scrollTop=drawerScroll;
  lastDrawer=state.drawer;
}

/* ============================ EVENTS ============================ */
document.getElementById('app').addEventListener('click',function(ev){
  var t=ev.target.closest('[data-act]');
  if(!t) return;
  var act=t.getAttribute('data-act');
  if(act==='view'){ state.view=t.getAttribute('data-v'); state.drawer=null; render(); }
  else if(act==='entity'){ state.entity=t.getAttribute('data-id'); state.drawer=null; render(); }
  else if(act==='drawer'){ state.drawer=t.getAttribute('data-id'); render(); }
  else if(act==='close-drawer'){ state.drawer=null; render(); }
  else if(act==='tab'){ state.indexTab=t.getAttribute('data-k'); render(); }
  else if(act==='filter'){ state.feedFilter=t.getAttribute('data-f'); render(); }
  else if(act==='promote'){ state.promoted[t.getAttribute('data-id')]=true; render(); }
  else if(act==='review'){
    var id=t.getAttribute('data-id');
    var arr=(state.userAudit[id]||[]).slice();
    arr.push({time:'just now',actor:'You · A. Renner',action:t.getAttribute('data-label'),id:'ACT-'+String(Date.now()).slice(-6),dot:C.comp});
    state.userAudit[id]=arr;
    state.review[id]=t.getAttribute('data-status');
    render();
  }
});

// slider: update in place, no full re-render (would interrupt the drag)
document.getElementById('app').addEventListener('input',function(ev){
  var t=ev.target;
  if(!(t.matches&&t.matches('input[type=range][data-k]'))) return;
  var k=t.getAttribute('data-k');
  state.calc[k]=parseFloat(t.value);
  var r=calcScores();
  var disp=document.getElementById('disp-'+k);
  if(disp) disp.textContent=k==='k'?state.calc.k.toFixed(1):state.calc[k].toFixed(2);
  var e1=document.getElementById('calc-ev1'); if(e1) e1.textContent=r.ev1.toFixed(2);
  var es=document.getElementById('calc-entity'); if(es) es.textContent=r.entityScore;
});

// esc closes drawer
document.addEventListener('keydown',function(ev){
  if(ev.key==='Escape'&&state.drawer){ state.drawer=null; render(); }
});

render();
})();
</script>
</body>
</html>
