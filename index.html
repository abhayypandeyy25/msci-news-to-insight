<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financial Intelligence OS — News-to-Insight Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:#16140F;color:#16140F;-webkit-font-smoothing:antialiased}
  ::selection{background:#5A4A8C22}
  .fi-scroll::-webkit-scrollbar{width:11px;height:11px}
  .fi-scroll::-webkit-scrollbar-thumb{background:#D8CFBB;border-radius:8px;border:3px solid transparent;background-clip:content-box}
  .fi-scroll::-webkit-scrollbar-thumb:hover{background:#c4b89e;background-clip:content-box}
  .fi-scroll::-webkit-scrollbar-track{background:transparent}
  .navsc::-webkit-scrollbar{width:0}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:#DED7C5;border-radius:2px;outline:none;margin:0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:#A8331F;cursor:pointer;border:2px solid #FBF8F1;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#A8331F;cursor:pointer;border:2px solid #FBF8F1}
  @keyframes fiDrawer{from{transform:translateX(30px)}to{transform:none}}
  @keyframes fiBackdrop{from{opacity:0}to{opacity:1}}
  @keyframes fiPulse{0%{box-shadow:0 0 0 0 rgba(47,107,79,.4)}70%{box-shadow:0 0 0 7px rgba(47,107,79,0)}100%{box-shadow:0 0 0 0 rgba(47,107,79,0)}}
  /* hover states (inline styles need !important to be overridden) */
  .nav-btn:hover{background:rgba(245,241,232,.06)!important}
  .chip:hover{border-color:#B9AF98!important}
  .idx-card:hover{box-shadow:0 5px 16px rgba(20,18,12,.09)!important}
  .feed-card:hover{box-shadow:0 6px 18px rgba(20,18,12,.08)!important;transform:translateY(-1px)!important}
  .icon-btn:hover{background:#EFEADD!important}
  .dark-btn:hover{background:rgba(245,241,232,.12)!important}
  .promote-btn:hover{background:#D3E7D9!important}
  .q-title:hover{color:#5A4A8C!important}
  .btn-confirm:hover{background:#D3E7D9!important}
  .btn-quar:hover{background:#F0E1C2!important}
  .btn-over:hover{background:#DED8EE!important}
  .fi-search:focus{border-color:#A8331F!important;background:#fff!important}
  .drawer-anim{animation:fiDrawer .3s cubic-bezier(.22,1,.36,1) both}
  .backdrop-anim{animation:fiBackdrop .25s ease both}
  /* trust-insight hover card */
  #trustpop{position:fixed;z-index:60;width:280px;background:#FBF8F1;border:1px solid #DED7C5;border-radius:11px;box-shadow:0 10px 30px rgba(20,18,12,.18);padding:13px 15px;pointer-events:none;opacity:0;transition:opacity .12s}
  #trustpop.show{opacity:1}
  [data-trust]{cursor:help}
  .hm-cell:hover{filter:brightness(0.96);box-shadow:0 4px 12px rgba(20,18,12,.12)}
  .q-card:hover{box-shadow:0 6px 18px rgba(20,18,12,.08);transform:translateY(-1px)}
  .toggle-row:hover{border-color:#B9AF98!important}
  input[type=checkbox].fi-check{accent-color:#2F6B4F;width:15px;height:15px}
</style>
</head>

function icon(name,size,sw,color){
  size=size||18; sw=sw||1.75;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+(color||'currentColor')+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;display:block">'+(PATHS[name]||'')+'</svg>';
}

function rgba(hex,a){ var n=parseInt(hex.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
function seed(i,s){ var x=Math.sin((i+1)*(s+1)*12.9898)*43758.5453; return x-Math.floor(x); }
function genSeries(end,delta,n,s){
  var start=end-delta, a=[];
  for(var i=0;i<n;i++){ var t=i/(n-1); var v=start+(end-start)*t;
    if(i>0&&i<n-1) v+=(seed(i,s)-0.5)*Math.max(5,Math.abs(delta));
    a.push(Math.max(3,Math.min(100,Math.round(v)))); }
  a[n-1]=Math.max(3,Math.min(100,end)); return a;
}

  var ar=ln+'L'+w+' '+h+' L0 '+h+' Z';
  var marker=(typeof markerIdx==='number'&&markerIdx>=0&&markerIdx<n)
    ?'<circle cx="'+X(markerIdx)+'" cy="'+Y(vals[markerIdx])+'" r="3.4" fill="none" stroke="'+color+'" stroke-width="1.6"/>'
     +'<circle cx="'+X(markerIdx)+'" cy="'+Y(vals[markerIdx])+'" r="1.4" fill="'+color+'"/>'

// week index of the sharpest move in a history series (spike marker)
function spikeIdx(hist){
  if(!hist||hist.length<2) return -1;
  var bi=-1,bd=0;
  for(var i=1;i<hist.length;i++){ var d=Math.abs(hist[i]-hist[i-1]); if(d>bd){bd=d;bi=i;} }
  return bd>=3?bi:-1;
}

/* ============================ MODEL ============================ */
function eventScore(e){ var cred=cellVal(e.source,e.sourceSector); return e.sev*cred*e.corr*e.vel*e.stg*e.dec; }
function allEvents(){
  var out=[]; Object.keys(entities).forEach(function(k){
    entities[k].events.forEach(function(e){ var c=Object.assign({},e); c._owner=k; c._ent=entities[k]; out.push(c); });
  }); return out;
}
function findEvent(id){
  var keys=Object.keys(entities);
  for(var i=0;i<keys.length;i++){ var e=entities[keys[i]].events.find(function(x){return x.id===id;}); if(e) return {ev:e,owner:keys[i]}; }
  return null;
}
function compositeHealth(sc){
  var opp=sc.momentum*indices.momentum.weight+sc.catalyst*indices.catalyst.weight+sc.sentiment*indices.sentiment.weight;
  var risk=sc.controversy*indices.controversy.weight+sc.risk*indices.risk.weight+sc.esg*indices.esg.weight;
  var oppW=indices.momentum.weight+indices.catalyst.weight+indices.sentiment.weight;
  var riskW=indices.controversy.weight+indices.risk.weight+indices.esg.weight;
  var oppN=opp/oppW, riskN=risk/riskW;
  var health=Math.round(50+(oppN-riskN)*0.72);
  return {health:Math.max(0,Math.min(100,health)),oppN:Math.round(oppN),riskN:Math.round(riskN)};
}
function healthMeta(h){
  if(h>=65) return {c:C.opp,bg:C.oppBg,border:'#BCD6C4',label:'Healthy'};
  if(h>=50) return {c:C.gate,bg:C.gateBg,border:'#E4C98A',label:'Watch'};
  return {c:C.risk,bg:C.riskBg,border:'#E4B3A6',label:'Stressed'};
}
function credLabelColor(c){ return (c==='High'||c==='Verified')?C.opp:(c==='Medium'?C.gate:C.mute); }
function totalQuarantined(){
  return allEvents().filter(function(e){
    return e.quarantined && !(state.review[e.id]==='confirmed'||state.review[e.id]==='overridden') && !state.promoted[e.id];
  }).length;
}

var SRC_CLASS_CACHE={};
function source_class_of(dm){
  if(SRC_CLASS_CACHE[dm]!==undefined) return SRC_CLASS_CACHE[dm];
  var d=(dm||'').toLowerCase(), cls='Aggregators & other';
  var map=[
    ['Regulator & exchange',['rbi.org.in','sebi.gov.in','nseindia','bseindia','irdai','pib.gov.in']],
    ['Agency wires',['reuters','ptinews','aninews','ians','bloomberg','apnews']],
    ['Business press',['economictimes','livemint','business-standard','moneycontrol','businesstoday','financialexpress','thehindubusinessline','businessline','cnbctv18','zeebiz','ndtvprofit','bqprime','fortuneindia','forbesindia']],
    ['General & regional press',['timesofindia','hindustantimes','thehindu','indianexpress','news18','indiatoday','deccanherald','telegraphindia','tribuneindia','freepressjournal','dnaindia','firstpost','theprint','thewire','scroll.in','oneindia','dailyhunt','amarujala','bhaskar','jagran','navbharattimes','zeenews','abplive','ndtv.com']]
  ];
  for(var i=0;i<map.length;i++){
    for(var j=0;j<map[i][1].length;j++){
      if(d.indexOf(map[i][1][j])>=0){ cls=map[i][0]; break; }
    }
    if(cls!=='Aggregators & other') break;
  }
  SRC_CLASS_CACHE[dm]=cls;
  return cls;
}

// fire-rate per week estimated from the real backfill window
function alertRate(id,thr){
  var ids=watchIds(), weeks=12, n=0;
  function crossings(key){
    var c=0;
    ids.forEach(function(eid){
      var h=entities[eid].indexHistory&&entities[eid].indexHistory[key];
      if(!h) return;
      if(h[0]>=thr) c++; // already elevated at window start counts as one firing
      for(var i=1;i<h.length;i++) if(h[i]>=thr&&h[i-1]<thr) c++;
    });
    return c;
  }
  function evCount(fn){
    var c=0;
    ids.forEach(function(eid){ (entities[eid].events||[]).forEach(function(e){ if(!e.quarantined&&fn(e)) c++; }); });
    return c;
  }
  if(id==='ctrl') n=crossings('controversy');
  else if(id==='esg') n=crossings('esg');
  else if(id==='mom'){
    ids.forEach(function(eid){
      var h=entities[eid].indexHistory&&entities[eid].indexHistory.momentum;
      if(!h) return;
      for(var i=1;i<h.length;i++) if(h[i]-h[i-1]>=thr) n++;
    });
  }
  else if(id==='vel') n=evCount(function(e){ return e.vel>=thr; });
  else if(id==='reg'){ n=evCount(function(e){ return e.pillar==='Legal & compliance'; }); weeks=26; }
  else if(id==='key'){ n=evCount(function(e){ return e.pillar==='Key-person risk'; }); weeks=26; }
  var r=n/weeks;
  return r>=1?('~'+r.toFixed(1)+'/week'):r>0?('~'+(r*4).toFixed(1)+'/month'):'rare';
}

/* ------------ WATCHLIST MONITOR ------------ */
function domSignal(sc){
  var riskMax=Math.max(sc.controversy,sc.risk,sc.esg);
  var oppMax=Math.max(sc.momentum,sc.catalyst,sc.sentiment);
  if(riskMax<25&&oppMax<25) return {side:'quiet',hi:false};
  var side=riskMax>=oppMax?'risk':'opp';
  return {side:side,hi:(side==='risk'?riskMax:oppMax)>=55};
}
function monitorEvents(){
  var out=[];
  watchIds().forEach(function(id){
    (entities[id].events||[]).forEach(function(e){
      if(!srcVisible(e.source)) return;
      var q=e.quarantined&&!(state.review[e.id]==='confirmed'||state.review[e.id]==='overridden')&&!state.promoted[e.id];
      out.push({e:e,ent:entities[id],entId:id,q:q,days:timeDays(e.time),score:eventScore(e)});
    });
  });
  out.sort(function(a,b){ return a.days-b.days || b.score-a.score; });
  return out;
}
function renderMonitor(){
  var ids=watchIds();
  var mf=state.monitorFilter;
  var sideMap={risk:['controversy','risk','esg'],opp:['momentum','catalyst','sentiment']};

  // KPIs
  var totalEvents=0, trustSum=0, trustN=0, mover=null;
  ids.forEach(function(id){
    var e=entities[id];
    totalEvents+=(e.events||[]).length;
    (e.events||[]).forEach(function(ev){
      if(!ev.quarantined){ trustSum+=cellVal(ev.source,ev.sourceSector); trustN++; }
    });
    if(!mover||Math.abs(e.trend)>Math.abs(mover.trend)) mover=e;
  });
  var avgTrust=trustN?(trustSum/trustN):0;
  function kpi(label,val,color,sub){
    return '<div style="flex:1;min-width:150px;background:#FBF8F1;border:1px solid #DED7C5;border-radius:11px;padding:14px 16px">'

      +'<div style="font:700 22px \'IBM Plex Mono\';color:'+(color||'#16140F')+';margin-top:5px">'+val+'</div>'
      +(sub?'<div style="font:500 10.5px \'Hanken Grotesk\';color:#A79F8C;margin-top:2px">'+sub+'</div>':'')+'</div>';

    +kpi('Events this window',totalEvents)

  }).join('');
  var legend=[['#ECE7DA','Quiet'],[C.risk,'Risk · high'],['#E8B3A6','Risk · building'],[C.opp,'Opp · high'],['#BCD6C4','Opp · building']].map(function(l){

      +'<span style="flex:0 0 auto;font:600 10.5px \'IBM Plex Mono\';color:#4A463C;background:#F0EBDE;padding:3px 7px;border-radius:5px">'+r.ent.ticker+'</span>'
      +'<div style="flex:1;min-width:0"><div style="font:600 12.5px/1.3 \'Hanken Grotesk\';color:#16140F;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.e.title+'</div>'
      +'<div style="display:flex;align-items:center;gap:7px;margin-top:2px"><span style="font:700 9px \'Hanken Grotesk\';letter-spacing:.04em;text-transform:uppercase;color:'+ix.color+'">'+ix.name+'</span>'
      +'<span style="font:500 10.5px \'Hanken Grotesk\';color:#A79F8C">'+r.e.pillar+'</span>'
      +'<span data-trust="'+(r.e.domain||'')+'" data-trust-class="'+r.e.source+'" style="display:inline-flex;align-items:center;gap:4px;font:600 9.5px \'Hanken Grotesk\';color:'+bc+';background:'+rgba(bc,0.12)+';padding:1px 7px;border-radius:5px">'+band+' '+cred.toFixed(2)+'</span></div></div>'
      +'<div style="flex:0 0 auto;text-align:right"><div style="font:700 12px \'IBM Plex Mono\';color:'+(r.q?C.mute:(dirPos?C.opp:C.risk))+'">'+(r.q?'held':(dirPos?'+':'−')+r.score.toFixed(2))+'</div>'
      +'<div style="font:500 10px \'Hanken Grotesk\';color:#B0A891">'+r.e.time+'</div></div></button>';
  }).join('');

  var filters=[['all','All signals'],['risk','Risk-side'],['opp','Opportunity']].map(function(f){
    var active=mf===f[0];
    return '<button data-act="mfilter" data-f="'+f[0]+'" style="border:none;cursor:pointer;border-radius:7px;padding:6px 13px;font:600 12px \'Hanken Grotesk\';color:'+(active?C.ink:'#8A8474')+';background:'+(active?'#fff':'transparent')+';box-shadow:'+(active?'0 1px 2px rgba(20,18,12,.1)':'none')+'">'+f[1]+'</button>';

  return '<div style="padding:24px 30px 44px 30px;max-width:1320px;margin:0 auto">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">'
    +'<div style="font:500 12.5px \'Hanken Grotesk\';color:#6E6858">'+ids.length+' entities · '+(FI?FI.sectorLabel:'demo')+' · '+(FI?FI.window:'')+(state.watchlist?' · custom watchlist':'')+'</div>'

    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px">'+kpis+'</div>'
    +'<div style="display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:22px;align-items:start">'
    +'<div><h3 style="font:600 17px \'Newsreader\',serif;color:#16140F;margin:0 0 12px 0">Needs attention</h3>'
    +'<div style="display:flex;flex-direction:column;gap:9px">'+queue+'</div></div>'
    +'<div><h3 style="font:600 17px \'Newsreader\',serif;color:#16140F;margin:0 0 12px 0">Live event stream</h3>'
    +'<div class="fi-scroll" style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:6px 14px;max-height:460px;overflow-y:auto">'+feedRows+'</div></div>'
    +'</div>'
    +'<h3 style="font:600 17px \'Newsreader\',serif;color:#16140F;margin:26px 0 12px 0">Watchlist heatmap</h3>'
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">'+hmCells+'</div>'
    +'<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:13px">'+legend+'</div></div>'
    +'</div>';
}

/* ------------ WORKBENCH ------------ */
function renderWorkbench(){
  var ent=entities[state.entity], ch=compositeHealth(ent.scores), hm=healthMeta(ch.health);
  var eSeed=Object.keys(entities).indexOf(state.entity);

  // entity strip
  var strip=watchIds().map(function(id){
    var e=entities[id], c=compositeHealth(e.scores), m=healthMeta(c.health), active=state.entity===id;
    return '<button data-act="entity" data-id="'+id+'" class="chip" style="display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:9px;padding:6px 11px;border:1px solid '+(active?C.ink:'#DED7C5')+';background:'+(active?'#FBF8F1':'transparent')+'">'
      +'<span style="display:flex;color:'+(active?C.ink:C.mute)+'">'+icon(sectors[e.sector].icon,13,2)+'</span>'
      +'<span style="font:600 12.5px \'Hanken Grotesk\'">'+e.ticker+'</span>'
      +'<span style="font:700 12px \'IBM Plex Mono\';color:'+m.c+'">'+c.health+'</span></button>';
  }).join('');

  // netting
  var oppPct=(ch.oppN+ch.riskN)?Math.round(ch.oppN/(ch.oppN+ch.riskN)*100):50;
  var trend=(ent.trend>0?'+':'')+ent.trend;
  var trendColor=ent.trend>0?C.opp:(ent.trend<0?C.risk:C.mute);
  var trendIcon=icon(ent.trend>0?'trending-up':'trending-down',15,2.2,ent.trend>0?C.opp:C.risk);
  var histSeries=ent.history&&ent.history.length?ent.history:genSeries(ch.health,ent.trend,12,eSeed+20);
  var history=sparkSvg(histSeries,hm.c,54,'comphist',FI?spikeIdx(histSeries):-1);
  var hasStaged=ent.events&&ent.events.some&&ent.events.some(function(ev){return ev.stage;});
  var histLegend=FI?'<div style="display:flex;gap:12px;margin-top:6px;font:500 10px \'Hanken Grotesk\';color:#A79F8C"><span>◎ sharpest weekly move</span><span>▼ decay as events age</span>'+(hasStaged?'<span>↻ stage-tracked clusters can reignite</span>':'')+'</div>':'';

  // index cards
  var ff=state.feedFilter||'all';
  var cards=indexOrder.map(function(k,ki){
    var ix=indices[k], sc=ent.scores[k];
    var riskSide=ix.side==='Risk';
    var dv, series;
    if(ent.indexHistory&&ent.indexHistory[k]){
      series=ent.indexHistory[k];
      dv=series[series.length-1]-series[Math.max(0,series.length-5)];
    } else {
      dv=Math.round((seed(ki,eSeed+1)-0.5)*8);
      series=genSeries(sc,dv,8,eSeed*7+ki+1);
    }
    var good=riskSide?dv<0:dv>0;
    var dcolor=dv===0?C.mute:(good?C.opp:C.risk);
    var active=ff===k;
    var spark=sparkSvg(series,ix.color,22,'spk-'+k);
    return '<button data-act="filter" data-f="'+k+'" class="idx-card" style="text-align:left;cursor:pointer;background:'+(active?'#FBF8F1':'#fff')+';border:1px solid '+(active?ix.color:'#E9E3D5')+';border-top:3px solid '+ix.color+';border-radius:10px;padding:12px 13px;box-shadow:'+(active?'0 0 0 2px '+rgba(ix.color,0.16):'none')+'">'
      +'<div style="display:flex;align-items:center;justify-content:space-between"><span style="color:'+ix.color+';display:flex">'+icon(ix.icon,16,2,ix.color)+'</span>'
      +'<span style="font:600 9px \'Hanken Grotesk\';letter-spacing:.06em;text-transform:uppercase;color:'+ix.color+'">'+(riskSide?'Risk':'Opp')+'</span></div>'
      +'<div style="font:600 12.5px/1.15 \'Hanken Grotesk\';color:#16140F;margin-top:9px;min-height:29px">'+ix.name+'</div>'
      +'<div style="display:flex;align-items:baseline;gap:5px;margin-top:6px"><span style="font:700 24px/1 \'IBM Plex Mono\';color:'+ix.color+'">'+sc+'</span>'
      +'<span style="font:600 10px \'IBM Plex Mono\';color:'+dcolor+'">'+(dv>0?'+':'')+dv+'</span></div>'
      +'<div style="height:4px;border-radius:2px;background:#EFEADD;overflow:hidden;margin-top:7px"><div style="height:100%;width:'+sc+'%;background:'+ix.color+';border-radius:2px"></div></div>'
      +'<div style="margin-top:7px;height:22px">'+spark+'</div></button>';
  }).join('');

  // weights
  var weights=indexOrder.map(function(k){
    var ix=indices[k];
    return '<div><div style="display:flex;justify-content:space-between;font:500 12px \'Hanken Grotesk\';color:#4A463C;margin-bottom:4px">'
      +'<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:2px;background:'+ix.color+'"></span>'+ix.name+'</span>'
      +'<span style="font:600 11px \'IBM Plex Mono\';color:#6E6858">'+Math.round(ix.weight*100)+'%</span></div>'
      +'<div style="height:5px;border-radius:3px;background:#EFEADD;overflow:hidden"><div style="height:100%;width:'+(ix.weight/0.22*100)+'%;background:'+ix.color+';border-radius:3px"></div></div></div>';
  }).join('');

  // feed
  var sideMap={risk:['controversy','risk','esg'],opp:['momentum','catalyst','sentiment']};
  var rawFeed=ent.events.slice().filter(function(e){ return srcVisible(e.source); }).sort(function(a,b){ return eventScore(b)-eventScore(a); });
  if(ff==='risk') rawFeed=rawFeed.filter(function(e){ return sideMap.risk.indexOf(e.index)>=0; });
  else if(ff==='opp') rawFeed=rawFeed.filter(function(e){ return sideMap.opp.indexOf(e.index)>=0; });

      +'<span style="font:500 11px \'Hanken Grotesk\';color:#A79F8C">· '+e.pillar+'</span>'
      +'<span style="margin-left:auto;font:500 11px \'Hanken Grotesk\';color:#A79F8C">'+e.time+'</span></div>'
      +'<div style="font:600 15px/1.35 \'Hanken Grotesk\';color:#16140F">'+e.title+'</div>'
      +'<div style="font:400 13px/1.5 \'Hanken Grotesk\';color:#4A463C;margin-top:4px">'+e.desc+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap">'
      +'<span data-trust="'+(e.domain||'')+'" data-trust-class="'+e.source+'" style="display:inline-flex;align-items:center;gap:5px;font:500 11px \'IBM Plex Mono\';color:#6E6858;background:#F0EBDE;padding:3px 8px;border-radius:6px">'+icon('shield',11,2)+e.source+'</span>'
      +'<span style="display:inline-flex;align-items:center;gap:5px;font:600 11px \'Hanken Grotesk\';color:'+(dirPos?C.opp:C.risk)+';background:'+(dirPos?C.oppBg:C.riskBg)+';padding:3px 9px;border-radius:6px">'+icon(dirPos?'arrow-up-right':'arrow-down-right',11,2.4,dirPos?C.opp:C.risk)+e.direction+'</span>'
      +(e.stage?'<span style="display:inline-flex;align-items:center;gap:5px;font:600 10.5px \'Hanken Grotesk\';color:#8A5A0E;background:#F6EBD6;padding:3px 9px;border-radius:6px;text-transform:capitalize">'+icon('clock',11,2.2,'#8A5A0E')+e.stage+'</span>':'')
      +(q?'<span style="display:inline-flex;align-items:center;gap:5px;font:600 11px \'Hanken Grotesk\';color:#B5791A;background:#F6EBD6;border:1px solid #E4C98A;padding:3px 9px;border-radius:6px">'+icon('lock',11,2.2,C.gate)+'Quarantined</span>':'')
      +'<span style="margin-left:auto;display:inline-flex;align-items:center;gap:7px">'
      +'<span style="font:500 10px \'Hanken Grotesk\';color:#A79F8C;text-transform:uppercase;letter-spacing:.05em">Contribution</span>'
      +'<span style="font:700 13px \'IBM Plex Mono\';color:'+(dirPos?C.opp:C.risk)+'">'+(dirPos?'+':'−')+eventScore(e).toFixed(2)+'</span>'
      +'<span style="color:#5A4A8C;display:flex">'+icon('arrow-right',13,2.2,C.comp)+'</span></span>'
      +'</div></button>';
  }).join('');

  var filters=[['all','All'],['risk','Risk-side'],['opp','Opp-side']].map(function(f){
    var active=ff===f[0];
    return '<button data-act="filter" data-f="'+f[0]+'" style="border:none;cursor:pointer;border-radius:7px;padding:6px 13px;font:600 12px \'Hanken Grotesk\';color:'+(active?C.ink:'#8A8474')+';background:'+(active?'#fff':'transparent')+';box-shadow:'+(active?'0 1px 2px rgba(20,18,12,.1)':'none')+'">'+f[1]+'</button>';
  }).join('');

  var idxSel=indexOrder.indexOf(ff)>=0;
  var clearBtn='';
  if(idxSel){
    var fx=indices[ff];
    clearBtn='<button data-act="filter" data-f="all" style="display:inline-flex;align-items:center;gap:6px;font:600 11.5px \'Hanken Grotesk\';color:'+fx.color+';background:'+rgba(fx.color,0.1)+';border:1px solid '+fx.color+';border-radius:7px;padding:4px 9px;cursor:pointer">'+icon(fx.icon,12,2,fx.color)+fx.name+' only '+icon('x',12,2.4)+'</button>';
  }
  var emptyMsg='';
  if(rawFeed.length===0){
    emptyMsg='<div style="background:#FBF8F1;border:1px dashed #DED7C5;border-radius:12px;padding:28px;text-align:center;font:500 13px \'Hanken Grotesk\';color:#A79F8C">No '+(idxSel?indices[ff].name+' only':'')+' events for '+ent.name+' this cycle.</div>';
  }

  return '<div style="padding:24px 30px 44px 30px;max-width:1320px;margin:0 auto">'
    // entity strip
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px">'
    +'<span style="font:700 9.5px \'Hanken Grotesk\';letter-spacing:.14em;text-transform:uppercase;color:#8A8474;margin-right:4px">Coverage</span>'+strip+'</div>'
    // hero
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:16px;overflow:hidden">'
    +'<div style="display:grid;grid-template-columns:minmax(0,1fr) 380px">'
    +'<div style="padding:24px 26px;border-right:1px solid #E9E3D5">'
    +'<div style="display:flex;align-items:flex-start;gap:16px">'
    +'<div style="width:52px;height:52px;border-radius:13px;background:'+C.compBg+';color:'+C.comp+';display:flex;align-items:center;justify-content:center;flex:0 0 auto">'+icon(sectors[ent.sector].icon,24,1.7)+'</div>'
    +'<div style="flex:1;min-width:0"><h2 style="font:600 25px/1.05 \'Newsreader\',serif;color:#16140F;margin:0;letter-spacing:-.01em">'+ent.name+'</h2>'
    +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:7px">'
    +'<span style="font:600 11.5px \'IBM Plex Mono\';color:#4A463C;background:#F0EBDE;border:1px solid #E0D9C8;padding:2px 8px;border-radius:6px">'+ent.ticker+'</span>'
    +'<span style="font:500 13px \'Hanken Grotesk\';color:#6E6858">'+ent.sector+' · '+ent.meta+'</span></div></div></div>'

    +'<div style="margin-top:24px">'

    +'<span style="font:500 11px \'Hanken Grotesk\';color:#A79F8C">opportunity offsets risk</span></div>'

    +'<div style="width:'+(100-oppPct)+'%;background:linear-gradient(90deg,#B23A24,#A8331F);display:flex;align-items:center;justify-content:flex-end;padding-right:12px;font:700 12px \'IBM Plex Mono\';color:#F7E7E2">'+ch.riskN+' ▼</div></div>'

    +'<span style="font:500 11px \'Hanken Grotesk\';color:#2F6B4F">Opportunity-side composite</span>'

    // stat cards
    +'<div style="display:flex;gap:8px;margin-top:22px;flex-wrap:wrap">'
    +'<div style="flex:1;min-width:120px;background:#fff;border:1px solid #E9E3D5;border-radius:9px;padding:11px 13px">'
    +'<div style="font:500 10px \'Hanken Grotesk\';color:#8A8474;text-transform:uppercase;letter-spacing:.06em">Trend · 30d</div>'
    +'<div style="display:flex;align-items:baseline;gap:6px;margin-top:4px"><span style="color:'+trendColor+';display:flex">'+trendIcon+'</span><span style="font:700 16px \'IBM Plex Mono\';color:'+trendColor+'">'+trend+'</span></div></div>'
    +'<div style="flex:1;min-width:120px;background:#fff;border:1px solid #E9E3D5;border-radius:9px;padding:11px 13px">'
    +'<div style="font:500 10px \'Hanken Grotesk\';color:#8A8474;text-transform:uppercase;letter-spacing:.06em">Live events</div>'

    +'</div></div>'
    // right: health
    +'<div style="padding:24px 26px;background:linear-gradient(160deg,#EDE9F3,#FBF8F1 75%);display:flex;flex-direction:column;justify-content:center">'
    +'<div style="font:700 10px \'Hanken Grotesk\';letter-spacing:.13em;text-transform:uppercase;color:#5A4A8C">Entity Health Score</div>'

    +'<span style="width:8px;height:8px;border-radius:50%;background:'+hm.c+'"></span>'

    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font:700 9.5px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:#8A8474">12-week history</span>'

/* ------------ TRUST TOLLGATE ------------ */
function renderTollgate(){

  var rows=matrixSources.map(function(src){
    var cells=matrixSectors.map(function(sec){
      var v=cellVal(src,sec), m=cellMeta(v);
      return '<td style="padding:0"><div style="height:44px;border-radius:7px;background:'+m.bg+';color:'+m.fg+';display:flex;flex-direction:column;align-items:center;justify-content:center;font:600 14px \'IBM Plex Mono\'">'+v.toFixed(2)
        +'<span style="font:600 8.5px \'Hanken Grotesk\';letter-spacing:.06em;text-transform:uppercase;opacity:.85;margin-top:1px">'+m.tier.split(' ')[0]+'</span></div></td>';

  }).join('');

  var legend=[{c:C.opp,l:'High · trusted (≥0.80)'},{c:C.gate,l:'Medium (0.50–0.79)'},{c:C.risk,l:'Low · quarantine (<0.50)'}].map(function(lg){
    return '<span style="display:inline-flex;align-items:center;gap:7px;font:500 12px \'Hanken Grotesk\';color:#4A463C"><span style="width:15px;height:15px;border-radius:4px;background:'+lg.c+'"></span>'+lg.l+'</span>';
  }).join('');

  var logic=promoLogic.map(function(p){
    return '<div style="padding:12px 16px;border-bottom:1px solid #EDE7D9">'
      +'<div style="font:600 13px \'Hanken Grotesk\';color:#16140F">'+p.t+'</div>'

  var qEvents=allEvents().filter(function(e){ return e.quarantined; });

    var ix=indices[e.index], cred=cellVal(e.source,e.sourceSector);

      +'<div style="flex:1;min-width:180px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span style="font:700 10px \'Hanken Grotesk\';letter-spacing:.03em;text-transform:uppercase;color:'+ix.color+'">'+ix.name+'</span><span style="font:500 11px \'Hanken Grotesk\';color:#A79F8C">· '+e._ent.name+'</span></div>'
      +'<button data-act="drawer" data-id="'+e.id+'" class="q-title" style="text-align:left;background:none;border:none;padding:0;cursor:pointer;font:600 14.5px \'Hanken Grotesk\';color:#16140F">'+e.title+'</button></div>'
      +'<div style="text-align:center"><div style="font:500 10px \'Hanken Grotesk\';color:#A79F8C;text-transform:uppercase;letter-spacing:.05em">Trust cell</div><div style="font:700 14px \'IBM Plex Mono\';color:#A8331F;margin-top:2px">'+cred.toFixed(2)+'</div></div>'

      +'<span style="font:600 11px \'Hanken Grotesk\';color:'+(promoted?C.opp:C.gate)+';background:'+(promoted?C.oppBg:C.gateBg)+';padding:5px 11px;border-radius:7px">'+(promoted?'Promoted':'Watch')+'</span>'
      +(canPromote?'<button data-act="promote" data-id="'+e.id+'" class="promote-btn" style="font:600 12px \'Hanken Grotesk\';color:#2F6B4F;background:#E2EFE6;border:1px solid #BCD6C4;border-radius:8px;padding:7px 13px;cursor:pointer">Promote →</button>':'')

  return '<div style="padding:24px 30px 44px 30px;max-width:1180px;margin:0 auto">'

    +'<div style="display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:26px;align-items:start;margin-top:20px">'

    +(qEvents.length?'<div style="display:flex;flex-direction:column;gap:11px">'+queue+'</div>':'')

/* ------------ SCORING MODEL ------------ */
var scoringOther=[{n:'Viral labor backlash',m:'PR · allegation',v:0.53},{n:'Environmental fine',m:'settled · 5mo old',v:0.06}];
function calcScores(){
  var c=state.calc;
  var ev1=c.sev*c.cred*c.corr*c.vel*c.stg*c.dec;
  var raw=ev1+scoringOther[0].v+scoringOther[1].v;
  return {ev1:ev1, entityScore:Math.round(100*raw/(raw+c.k))};
}
function renderScoring(){
  var c=state.calc, r=calcScores();
  var sliders=[
    {k:'sev',label:'Severity',min:0.1,max:1,step:0.05,val:c.sev,disp:c.sev.toFixed(2)},
    {k:'cred',label:'Credibility',min:0.1,max:1,step:0.05,val:c.cred,disp:c.cred.toFixed(2)},
    {k:'corr',label:'Corroboration',min:1,max:1.5,step:0.05,val:c.corr,disp:c.corr.toFixed(2)},
    {k:'vel',label:'Velocity',min:0.8,max:1.5,step:0.05,val:c.vel,disp:c.vel.toFixed(2)},
    {k:'stg',label:'Stage modifier',min:0.3,max:1.4,step:0.1,val:c.stg,disp:c.stg.toFixed(2)},
    {k:'dec',label:'Decay',min:0.1,max:1,step:0.05,val:c.dec,disp:c.dec.toFixed(2)},
    {k:'k',label:'Sector k',min:1,max:6,step:0.5,val:c.k,disp:c.k.toFixed(1)}
  ];
  var rows=sliders.map(function(s){
    return '<label style="font:500 13px \'Hanken Grotesk\';color:#4A463C">'+s.label+'</label>'
      +'<input type="range" data-k="'+s.k+'" min="'+s.min+'" max="'+s.max+'" step="'+s.step+'" value="'+s.val+'" />'
      +'<output id="disp-'+s.k+'" style="text-align:right;font:600 13px \'IBM Plex Mono\';color:#16140F">'+s.disp+'</output>';
  }).join('');
  var others=scoringOther.map(function(o){
    return '<div style="display:flex;justify-content:space-between;padding:4px 0;font:500 13px \'Hanken Grotesk\';color:#4A463C"><span>'+o.n+' <span style="color:#A79F8C">· '+o.m+'</span></span><span style="font:600 13px \'IBM Plex Mono\'">'+o.v+'</span></div>';
  }).join('');

  return '<div style="padding:24px 30px 44px 30px;max-width:940px;margin:0 auto">'
    +'<div style="display:flex;align-items:flex-start;gap:15px;margin-bottom:20px">'
    +'<div style="width:48px;height:48px;border-radius:12px;background:#E9E5F3;display:flex;align-items:center;justify-content:center;flex:0 0 auto">'+icon('gauge',24,1.7,C.comp)+'</div>'
    +'<div><h2 style="font:600 24px/1.05 \'Newsreader\',serif;color:#16140F;margin:0">The event engine</h2>'
    +'<p style="font:400 14px/1.5 \'Hanken Grotesk\';color:#4A463C;margin:7px 0 0 0;max-width:74ch">One six-factor score per event, aggregated into an entity 0–100 through a saturating curve. Pull the sliders to see how a single event moves an entity score.</p></div></div>'
    +'<div style="background:#16140F;border-radius:14px;padding:24px 26px;margin-bottom:20px">'
    +'<div style="font:600 10.5px \'IBM Plex Mono\';color:#9DB9C9;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Per-event score</div>'
    +'<div style="font:500 15px/1.7 \'IBM Plex Mono\';color:#E8E2D4">EventScore = <span style="color:#E8A87C">Severity</span> × <span style="color:#E8A87C">Credibility</span> × <span style="color:#E8A87C">Corroboration</span> × <span style="color:#E8A87C">Velocity</span> × <span style="color:#E8A87C">Stage</span> × <span style="color:#E8A87C">Decay</span></div>'
    +'<div style="font:600 10.5px \'IBM Plex Mono\';color:#9DB9C9;letter-spacing:.1em;text-transform:uppercase;margin:20px 0 12px 0">Aggregation to entity 0–100</div>'
    +'<div style="font:500 14.5px/1.7 \'IBM Plex Mono\';color:#E8E2D4">Raw = Σ EventScores <span style="color:#9DB9C9">(decay-weighted, capped)</span><br>EntityScore = 100 × Raw / (Raw + <span style="color:#E8A87C">k</span>) <span style="color:#9DB9C9">// sector-calibrated k</span></div></div>'
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:14px;padding:22px 24px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:18px"><span style="color:#5A4A8C;display:flex">'+icon('gauge',16,2)+'</span><span style="font:700 13px \'Hanken Grotesk\';color:#16140F">Live calculator — Event 1</span></div>'
    +'<div style="display:grid;grid-template-columns:150px 1fr 54px;gap:13px 16px;align-items:center">'+rows+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px">'
    +'<div style="background:#fff;border:1px solid #E9E3D5;border-radius:10px;padding:15px 17px">'
    +'<div style="font:500 12px \'Hanken Grotesk\';color:#8A8474">Event 1 score</div>'
    +'<div id="calc-ev1" style="font:700 27px \'IBM Plex Mono\';color:#16140F;margin-top:3px">'+r.ev1.toFixed(2)+'</div></div>'
    +'<div style="background:#F6E5DF;border-radius:10px;padding:15px 17px">'
    +'<div style="font:500 12px \'Hanken Grotesk\';color:#A8331F">Entity controversy score</div>'
    +'<div id="calc-entity" style="font:700 27px \'IBM Plex Mono\';color:#A8331F;margin-top:3px">'+r.entityScore+'</div></div></div>'
    +'<div style="margin-top:16px;border-top:1px solid #E9E3D5;padding-top:14px">'+others+'</div>'
    +'<p style="font:400 12px/1.6 \'Hanken Grotesk\';color:#8A8474;margin:14px 0 0 0">Pull <b style="font-weight:600">Stage modifier</b> to 0.3 (settlement) and watch Event 1 collapse — the saturating roll-up keeps any single event from running the score to 100.</p>'
    +'</div></div>';
}

  return '<div style="padding:24px 30px 44px 30px;max-width:900px;margin:0 auto">'

/* ------------ EVIDENCE DRAWER ------------ */
function renderDrawer(){
  if(!state.drawer) return '';
  var f=findEvent(state.drawer); if(!f) return '';
  var e=f.ev, ix=indices[e.index], es=eventScore(e);
  var cred=cellVal(e.source,e.sourceSector), cm=cellMeta(cred);
  var dirPos=e.dir==='pos';

  function factorRow(label,val,max,note,color){
    var pct=Math.min(100,(val/max)*100);
    return '<div><div style="display:flex;justify-content:space-between;align-items:baseline;font:500 12px \'Hanken Grotesk\';color:#4A463C;margin-bottom:4px"><span>'+label+'</span><span style="font:600 11.5px \'IBM Plex Mono\';color:'+color+'">'+val.toFixed(2)+'×</span></div>'
      +'<div style="height:5px;border-radius:3px;background:#EFEADD;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:3px"></div></div>'
      +'<div style="font:400 10.5px \'Hanken Grotesk\';color:#A79F8C;margin-top:3px">'+note+'</div></div>';
  }
  var factors=[
    factorRow('Severity',e.sev,1,'Magnitude of the event',ix.color),
    factorRow('Credibility',cred,1,e.source+' in '+e.sourceSector+' (tollgate)',C.gate),
    factorRow('Corroboration',e.corr,1.5,e.corroboration.length+' independent source(s)',ix.color),
    factorRow('Velocity',e.vel,1.5,'Rate of development',ix.color),
    factorRow('Stage',e.stg,1.4,e.stage?('Currently: '+e.stage):'Not stage-gated',ix.color),
    factorRow('Decay',e.dec,1,'Freshness weighting',ix.color)
  ].join('');

  // stage timeline
  var stagesHtml='';
  if(e.stage){
    var defs=[['Allegation',0.6],['Probe',1.2],['Charge',1.4],['Resolution',0.3]];
    var cur=e.stage.toLowerCase();
    var curIdx=defs.findIndex(function(d){ return d[0].toLowerCase()===cur; });
    var chain=defs.map(function(d,i){
      var label=d[0], mult=d[1], active=label.toLowerCase()===cur, passed=curIdx>=i;
      var bg=active?C.gate:(passed?C.gateBg:'#fff');
      var fg=active?'#fff':(passed?'#8A5A0E':C.mute);
      var border=active?C.gate:'#E0D9C8';
      var labelColor=active?C.ink:C.mute;
      return '<div style="display:flex;align-items:center;flex:0 0 auto">'
        +'<div style="display:flex;flex-direction:column;align-items:center;gap:6px">'
        +'<span style="width:26px;height:26px;border-radius:50%;background:'+bg+';color:'+fg+';border:2px solid '+border+';display:flex;align-items:center;justify-content:center;font:700 10px \'IBM Plex Mono\'">'+mult.toFixed(1)+'</span>'
        +'<span style="font:600 10px \'Hanken Grotesk\';color:'+labelColor+';text-align:center;max-width:56px">'+label+'</span></div>'
        +(i<defs.length-1?'<span style="width:20px;height:2px;background:#E0D9C8;margin:0 2px 18px 2px"></span>':'')
        +'</div>';
    }).join('');
    stagesHtml='<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:15px"><span style="color:#B5791A;display:flex">'+icon('clock',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Stage modifier</span></div>'
      +'<div style="display:flex;align-items:center">'+chain+'</div>'
      +'<div style="font:400 11.5px/1.5 \'Hanken Grotesk\';color:#6E6858;margin-top:13px">Settlement releases the score — a resolved matter collapses toward 0.3×, making this a live gauge, not a permanent blocklist.</div></div>';
  }

  var status=state.review[state.drawer]||(e.quarantined?'quarantined':'pending');
  var stMeta={
    pending:{label:'Pending analyst review',c:C.gate,bg:C.gateBg,border:'#E4C98A',icon:'clock'},
    confirmed:{label:'Confirmed by you',c:C.opp,bg:C.oppBg,border:'#BCD6C4',icon:'check'},
    quarantined:{label:'Quarantined — awaiting corroboration',c:C.gate,bg:C.gateBg,border:'#E4C98A',icon:'lock'},
    overridden:{label:'Overridden by you',c:C.comp,bg:C.compBg,border:'#D2CBE6',icon:'user'}
  }[status];
  var showQuar=e.quarantined&&status!=='confirmed'&&status!=='overridden';

  var corrob=e.corroboration.map(function(c2){
    var col=credLabelColor(c2.cred);
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#fff;border:1px solid #E9E3D5;border-radius:9px">'
      +'<span style="font:500 12.5px \'Hanken Grotesk\';color:#2A2820">'+c2.name+'</span>'
      +'<span style="display:inline-flex;align-items:center;gap:6px;font:600 11px \'Hanken Grotesk\';color:'+col+'"><span style="width:7px;height:7px;border-radius:50%;background:'+col+'"></span>'+c2.cred+'</span></div>';
  }).join('');

  var prov=e.provenance.map(function(p,i){
    return '<div style="display:flex;gap:12px">'
      +'<div style="display:flex;flex-direction:column;align-items:center;flex:0 0 auto">'
      +'<span style="width:21px;height:21px;border-radius:50%;background:#E9E3D5;color:#4A463C;display:flex;align-items:center;justify-content:center;font:700 10px \'IBM Plex Mono\'">'+(i+1)+'</span>'
      +(i<e.provenance.length-1?'<span style="width:2px;flex:1;background:#E0D9C8;min-height:13px"></span>':'')
      +'</div><div style="padding-bottom:13px"><div style="font:500 12.5px/1.4 \'Hanken Grotesk\';color:#2A2820">'+p+'</div></div></div>';
  }).join('');

  var auditRows=e.audit.map(function(a){ return {time:a.time,actor:a.actor,action:a.action,id:a.id,dot:'#C9C2B2'}; })
    .concat(state.userAudit[state.drawer]||[]);
  var audit=auditRows.map(function(au){
    return '<div style="display:flex;gap:11px">'

    +'<div style="display:flex;align-items:center;gap:13px">'

    +'<div style="font:400 11px/1.5 \'Hanken Grotesk\';color:#A79F8C;margin-top:11px">This source-sector weight is the credibility factor above. '+(cred<0.5?'Below the 0.5 threshold — event routed to quarantine until independently confirmed.':'At or above threshold — event flows straight to scoring.')+'</div>'
    +(function(){ var p=trustProfileFor(e.domain,e.source); if(!p) return '';

        +'<span style="font:600 11px \'IBM Plex Mono\';color:#8A8474">'+p.label+'</span></div>'

    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="color:#2C5C73;display:flex">'+icon('square-check',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Corroboration</span></div>'

    +'<div style="display:flex;flex-direction:column">'+prov+'</div></div>'
    // audit
    +'<div style="background:#FBF8F1;border:1px solid #DED7C5;border-radius:13px;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="color:#4A463C;display:flex">'+icon('scroll-text',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Audit trail</span></div>'

    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:11px"><span style="color:#5A4A8C;display:flex">'+icon('user',16)+'</span><span style="font:700 12.5px \'Hanken Grotesk\';color:#16140F">Analyst review</span></div>'

    +'<button data-act="review" data-id="'+e.id+'" data-status="quarantined" data-label="Sent to quarantine" class="btn-quar" style="display:flex;align-items:center;justify-content:center;gap:6px;height:37px;border-radius:9px;border:1px solid #E4C98A;background:#F6EBD6;color:#B5791A;font:600 12px \'Hanken Grotesk\';cursor:pointer">'+icon('lock',12,2.2,C.gate)+'Quarantine</button>'
    +'<button data-act="review" data-id="'+e.id+'" data-status="overridden" data-label="Overrode disposition" class="btn-over" style="display:flex;align-items:center;justify-content:center;gap:6px;height:37px;border-radius:9px;border:1px solid #D2CBE6;background:#E9E5F3;color:#5A4A8C;font:600 12px \'Hanken Grotesk\';cursor:pointer">'+icon('user',12,2,C.comp)+'Override</button>'

/* ============================ RENDER ============================ */
var viewRenderers={monitor:renderMonitor,articles:renderArticles,setup1:renderSetup1,setup2:renderSetup2,alerts:renderAlerts,workbench:renderWorkbench,indices:renderIndices,tollgate:renderTollgate,scoring:renderScoring,pipeline:renderPipeline,sources:renderSources,distribution:renderDistribution};

function render(){
  if(!entities[state.entity]||watchIds().indexOf(state.entity)<0) state.entity=watchIds()[0];
  var app=document.getElementById('app');
  var mainEl=document.getElementById('main');
  var mainScroll=mainEl?mainEl.scrollTop:0;
  var drawerEl=document.getElementById('drawer-scroll');
  var drawerScroll=(drawerEl&&lastDrawer===state.drawer)?drawerEl.scrollTop:0;

  app.innerHTML='<div style="display:flex;height:100vh;width:100%;overflow:hidden;background:#F5F1E8;font-family:\'Hanken Grotesk\',sans-serif">'
    +renderSidebar()
    +'<div style="flex:1;min-width:0;height:100%;display:flex;flex-direction:column">'
    +renderHeader()
    +'<main id="main" class="fi-scroll" style="flex:1;overflow-y:auto;background:#F5F1E8">'
    +viewRenderers[state.view]()
    +'</main></div>'
    +renderDrawer()
    +'</div>';

  var m=document.getElementById('main'); if(m) m.scrollTop=mainScroll;
  var d=document.getElementById('drawer-scroll'); if(d&&drawerScroll) d.scrollTop=drawerScroll;
  lastDrawer=state.drawer;
}

/* ============================ EVENTS ============================ */
document.getElementById('app').addEventListener('click',function(ev){
  var t=ev.target.closest('[data-act]');
  if(!t) return;
  var act=t.getAttribute('data-act');
  if(act==='view'){ state.view=t.getAttribute('data-v'); state.drawer=null; render(); }
  else if(act==='goent'){ state.entity=t.getAttribute('data-id'); state.view='workbench'; state.drawer=null; render(); }
  else if(act==='mfilter'){ state.monitorFilter=t.getAttribute('data-f'); render(); }
  else if(act==='entity'){ state.entity=t.getAttribute('data-id'); state.drawer=null; render(); }
  else if(act==='drawer'){ state.drawer=t.getAttribute('data-id'); render(); }
  else if(act==='close-drawer'){ state.drawer=null; render(); }
  else if(act==='tab'){ state.indexTab=t.getAttribute('data-k'); render(); }
  else if(act==='filter'){ state.feedFilter=t.getAttribute('data-f'); render(); }
  else if(act==='promote'){ state.promoted[t.getAttribute('data-id')]=true; render(); }
  else if(act==='review'){
    var id=t.getAttribute('data-id');
    var arr=(state.userAudit[id]||[]).slice();
    arr.push({time:'just now',actor:'You · A. Renner',action:t.getAttribute('data-label'),id:'ACT-'+String(Date.now()).slice(-6),dot:C.comp});
    state.userAudit[id]=arr;
    state.review[id]=t.getAttribute('data-status');
    render();
  }
  else if(act==='setup-mode'){ state.setupMode=t.getAttribute('data-m'); render(); }
  else if(act==='wl-seg'){
    var seg=t.getAttribute('data-s'), wl=wlCurrent();
    var segIds=Object.keys(entities).filter(function(i){return entities[i].sector===seg;});
    var allIn=segIds.every(function(i){return wl.indexOf(i)>=0;});
    if(allIn) wl=wl.filter(function(i){return segIds.indexOf(i)<0;});
    else segIds.forEach(function(i){ if(wl.indexOf(i)<0) wl.push(i); });
    wlSet(wl); render();
  }
  else if(act==='wl-add'){ var wl2=wlCurrent(); wl2.push(t.getAttribute('data-id')); wlSet(wl2); render(); }
  else if(act==='wl-rm'){ wlSet(wlCurrent().filter(function(i){return i!==t.getAttribute('data-id');})); render(); }
  else if(act==='wl-clear'){ state.watchlist=null; saveSetup(); render(); }
  else if(act==='wl-paste-add'){
    var ta=document.getElementById('wl-paste');
    if(ta){
      var wl3=wlCurrent();
      ta.value.split('\n').forEach(function(line){
        var q=line.trim().toLowerCase(); if(!q) return;
        Object.keys(entities).forEach(function(i){
          if(entities[i].name.toLowerCase().indexOf(q)>=0||entities[i].ticker.toLowerCase()===q){
            if(wl3.indexOf(i)<0) wl3.push(i);
          }
        });
      });
      wlSet(wl3); render();
    }
  }
  else if(act==='src-toggle'){
    var s=t.getAttribute('data-s');
    if(state.sourcesOff[s]) delete state.sourcesOff[s]; else state.sourcesOff[s]=true;
    saveSetup(); render();
  }
  else if(act==='alert-toggle'){ alertsInit(); state.alerts[t.getAttribute('data-id')].on=!state.alerts[t.getAttribute('data-id')].on; saveSetup(); render(); }
  else if(act==='ch-toggle'){ alertsInit(); var ch=t.getAttribute('data-id'); state.alertChannels[ch]=!state.alertChannels[ch]; saveSetup(); render(); }
  else if(act==='alerts-save'){ saveSetup(); toast('Alert rules saved — '+ALERT_RULES.filter(function(r){return state.alerts[r.id].on;}).length+' active rules, '+ALERT_CHANNELS.filter(function(c){return state.alertChannels[c[0]];}).length+' channels'); }
  else if(act==='art-more'){ artF.limit+=100; render(); }
  else if(act==='art-clear'){ artF={ent:'all',month:'all',src:'all',band:'all',disp:'all',origin:'all',q:'',limit:50}; render(); }
});

// article-explorer filter selects
document.getElementById('app').addEventListener('change',function(ev){
  var t=ev.target;
  if(t.matches&&t.matches('select[data-artf]')){
    artF[t.getAttribute('data-artf')]=t.value;
    artF.limit=50;
    render();
  }
});

function toast(msg){
  var el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:70;background:#16140F;color:#F5F1E8;font:600 12.5px \'Hanken Grotesk\';padding:11px 18px;border-radius:9px;box-shadow:0 8px 24px rgba(20,18,12,.3);animation:fiBackdrop .2s ease both';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); },2600);
}

// slider/search: update in place, no full re-render (would interrupt the drag/typing)
document.getElementById('app').addEventListener('input',function(ev){
  var t=ev.target;
  if(t.matches&&t.matches('input[type=range][data-k]')){
    var k=t.getAttribute('data-k');
    state.calc[k]=parseFloat(t.value);
    var r=calcScores();
    var disp=document.getElementById('disp-'+k);
    if(disp) disp.textContent=k==='k'?state.calc.k.toFixed(1):state.calc[k].toFixed(2);
    var e1=document.getElementById('calc-ev1'); if(e1) e1.textContent=r.ev1.toFixed(2);
    var es=document.getElementById('calc-entity'); if(es) es.textContent=r.entityScore;
    return;
  }
  if(t.matches&&t.matches('input[type=range][data-alert]')){
    alertsInit();
    var id=t.getAttribute('data-alert');
    var rule=ALERT_RULES.filter(function(x){return x.id===id;})[0];
    var thr=parseFloat(t.value);
    state.alerts[id].thr=thr; saveSetup();
    var thrEl=document.getElementById('thr-'+id);
    if(thrEl) thrEl.textContent=(rule.step<1?thr.toFixed(2):thr)+rule.unit;
    var frEl=document.getElementById('fr-'+id);
    if(frEl) frEl.textContent=alertRate(id,thr);
    return;
  }
  if(t.matches&&t.matches('[data-alert-batch]')){
    state.alertBatch=t.checked; saveSetup();
    return;
  }
  if(t.id==='art-q'){
    artF.q=t.value.trim().toLowerCase();
    artF.limit=50;
    // re-render list only, preserving input focus
    clearTimeout(window._artT);
    window._artT=setTimeout(function(){
      var scroll=document.getElementById('main')?document.getElementById('main').scrollTop:0;
      render();
      var q2=document.getElementById('art-q');
      if(q2){ q2.focus(); q2.setSelectionRange(q2.value.length,q2.value.length); }
      if(document.getElementById('main')) document.getElementById('main').scrollTop=scroll;
    },250);
    return;
  }
  if(t.id==='wl-search'){
    var q=t.value.trim().toLowerCase();
    var res=document.getElementById('wl-results');
    if(!res) return;
    if(!q){ res.innerHTML=''; return; }
    var wl=wlCurrent();
    var matches=Object.keys(entities).filter(function(i){
      return entities[i].name.toLowerCase().indexOf(q)>=0||entities[i].ticker.toLowerCase().indexOf(q)>=0;
    }).slice(0,6);
    res.innerHTML=matches.map(function(i){
      var inWl=wl.indexOf(i)>=0;
      return '<button data-act="'+(inWl?'wl-rm':'wl-add')+'" data-id="'+i+'" class="chip" style="display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;border-radius:9px;padding:9px 13px;border:1px solid '+(inWl?C.opp:'#DED7C5')+';background:'+(inWl?C.oppBg:'#FBF8F1')+'">'
        +'<span style="font:600 12.5px \'Hanken Grotesk\';color:#16140F;flex:1">'+entities[i].name+'</span>'
        +'<span style="font:500 10.5px \'IBM Plex Mono\';color:#8A8474">'+entities[i].ticker+'</span>'
        +icon(inWl?'check':'plus',13,2.4,inWl?C.opp:C.mute)+'</button>';
    }).join('')||'<div style="font:500 12px \'Hanken Grotesk\';color:#A79F8C;padding:6px 2px">No matches in the coverage universe.</div>';
  }
});

// esc closes drawer
document.addEventListener('keydown',function(ev){
  if(ev.key==='Escape'&&state.drawer){ state.drawer=null; render(); }
});

/* ============================ TRUST POPOVER ============================ */
function trustProfileFor(domain,cls){
  if(!FI||!FI.trustProfiles) return null;
  var tp=FI.trustProfiles;
  if(domain&&tp.outlets[domain]) return {label:domain,band:tp.outlets[domain].band,verdict:tp.outlets[domain].verdict};
  if(cls&&tp.classes[cls]) return {label:cls,band:tp.classes[cls].band,verdict:tp.classes[cls].verdict};
  return null;
}
var trustPop=document.createElement('div');
trustPop.id='trustpop';
document.body.appendChild(trustPop);
function bandColor(b){ return b==='High'?C.opp:b==='Medium'?C.gate:C.risk; }
document.getElementById('app').addEventListener('mouseover',function(ev){
  var t=ev.target.closest('[data-trust]');
  if(!t) return;
  var p=trustProfileFor(t.getAttribute('data-trust'),t.getAttribute('data-trust-class'));
  if(!p) return;
  var bc=bandColor(p.band);
  trustPop.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">'
    +'<span style="font:600 12px \'IBM Plex Mono\';color:#16140F">'+p.label+'</span>'
    +'<span style="display:inline-flex;align-items:center;gap:5px;font:600 10.5px \'Hanken Grotesk\';color:'+bc+';background:'+rgba(bc,0.12)+';padding:3px 9px;border-radius:6px"><span style="width:6px;height:6px;border-radius:50%;background:'+bc+'"></span>'+p.band+' trust</span></div>'
    +'<div style="font:400 12px/1.55 \'Hanken Grotesk\';color:#4A463C">'+p.verdict+'</div>';
  var r=t.getBoundingClientRect();
  var top=r.bottom+8, left=Math.min(window.innerWidth-296, Math.max(8, r.left));
  if(top+170>window.innerHeight) top=r.top-8-170;
  trustPop.style.top=top+'px'; trustPop.style.left=left+'px';
  trustPop.classList.add('show');
});
document.getElementById('app').addEventListener('mouseout',function(ev){
  if(ev.target.closest('[data-trust]')) trustPop.classList.remove('show');
});

render();
})();
